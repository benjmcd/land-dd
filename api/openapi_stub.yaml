components:
  schemas:
    AreaContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        area_type:
          $ref: '#/components/schemas/AreaType'
          default: drawn_polygon
        created_by:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Created By
        geom_confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        geom_geojson:
          additionalProperties: true
          title: Geom Geojson
          type: object
        geom_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Geom Source
        geom_srid:
          default: 4326
          title: Geom Srid
          type: integer
        geom_validated:
          default: false
          title: Geom Validated
          type: boolean
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
        workspace_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Workspace Id
      title: AreaContract
      type: object
    AreaType:
      enum:
      - parcel_like
      - drawn_polygon
      - multi_polygon
      - locality
      - buffer
      - generated_candidate
      title: AreaType
      type: string
    AsyncReportRunResponse:
      properties:
        connector_ingest_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Connector Ingest Run Id
        connector_review_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Connector Review Status
        report_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Report Run Id
        retry_of_report_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Retry Of Report Run Id
        status:
          title: Status
          type: string
      required:
      - status
      title: AsyncReportRunResponse
      type: object
    AuthorityLevel:
      enum:
      - official_primary
      - official_secondary
      - commercial_normalized
      - open_community
      - derived_model
      - user_supplied
      - unknown
      title: AuthorityLevel
      type: string
    ClaimContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        assertion:
          title: Assertion
          type: string
        claim_code:
          title: Claim Code
          type: string
        claim_id:
          format: uuid
          title: Claim Id
          type: string
        confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        domain:
          default: unknown
          title: Domain
          type: string
        evidence_ids:
          items:
            format: uuid
            type: string
          title: Evidence Ids
          type: array
        rule_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Rule Code
        ruleset_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Ruleset Id
        ruleset_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Ruleset Version
        severity:
          $ref: '#/components/schemas/SeverityBand'
          default: unknown
        user_safe_language:
          default: ''
          title: User Safe Language
          type: string
        verification_required:
          default: true
          title: Verification Required
          type: boolean
        verification_task:
          anyOf:
          - type: string
          - type: 'null'
          title: Verification Task
      required:
      - area_id
      - claim_code
      - assertion
      - evidence_ids
      title: ClaimContract
      type: object
    ConfidenceBand:
      enum:
      - very_low
      - low
      - medium
      - high
      - very_high
      - unknown
      title: ConfidenceBand
      type: string
    ConnectorFixtureQualityIssueResponse:
      properties:
        blocking:
          title: Blocking
          type: boolean
        code:
          title: Code
          type: string
        message:
          title: Message
          type: string
      required:
      - code
      - message
      - blocking
      title: ConnectorFixtureQualityIssueResponse
      type: object
    ConnectorFixtureQualityResponse:
      properties:
        blocking_issue_count:
          title: Blocking Issue Count
          type: integer
        evidence_count:
          title: Evidence Count
          type: integer
        issues:
          items:
            $ref: '#/components/schemas/ConnectorFixtureQualityIssueResponse'
          title: Issues
          type: array
        passed:
          title: Passed
          type: boolean
        source_failure_count:
          title: Source Failure Count
          type: integer
      required:
      - passed
      - evidence_count
      - source_failure_count
      - blocking_issue_count
      - issues
      title: ConnectorFixtureQualityResponse
      type: object
    ConnectorReportRunCreateRequest:
      properties:
        intent_code:
          $ref: '#/components/schemas/IntentCode'
      required:
      - intent_code
      title: ConnectorReportRunCreateRequest
      type: object
    ConnectorReportRunResponse:
      properties:
        connector_ingest_run_id:
          format: uuid
          title: Connector Ingest Run Id
          type: string
        report_run_id:
          format: uuid
          title: Report Run Id
          type: string
        status:
          title: Status
          type: string
      required:
      - report_run_id
      - status
      - connector_ingest_run_id
      title: ConnectorReportRunResponse
      type: object
    ConnectorReviewActionRequest:
      properties:
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      title: ConnectorReviewActionRequest
      type: object
    ConnectorReviewActionResponse:
      properties:
        action:
          title: Action
          type: string
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        new_status:
          title: New Status
          type: string
        queue_item:
          $ref: '#/components/schemas/ConnectorReviewQueueItemResponse'
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        reviewer_id:
          title: Reviewer Id
          type: string
      required:
      - action
      - ingest_run_id
      - reviewer_id
      - new_status
      - reason
      - queue_item
      title: ConnectorReviewActionResponse
      type: object
    ConnectorReviewQueueActionRequest:
      properties:
        not_before:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Not Before
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        reviewer_id:
          title: Reviewer Id
          type: string
      required:
      - reviewer_id
      title: ConnectorReviewQueueActionRequest
      type: object
    ConnectorReviewQueueItemContract:
      properties:
        attempts:
          default: 0
          title: Attempts
          type: integer
        created_at:
          format: date-time
          title: Created At
          type: string
        finished_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Finished At
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        job_id:
          format: uuid
          title: Job Id
          type: string
        job_type:
          title: Job Type
          type: string
        last_error:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Error
        locked_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Locked At
        locked_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Locked By
        max_attempts:
          default: 1
          title: Max Attempts
          type: integer
        not_before:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Not Before
        payload:
          additionalProperties: true
          title: Payload
          type: object
        priority:
          title: Priority
          type: integer
        started_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Started At
        status:
          $ref: '#/components/schemas/JobStatus'
        workspace_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Workspace Id
      required:
      - job_id
      - ingest_run_id
      - job_type
      - status
      - priority
      - payload
      - created_at
      title: ConnectorReviewQueueItemContract
      type: object
    ConnectorReviewQueueItemResponse:
      properties:
        attempts:
          title: Attempts
          type: integer
        created_at:
          format: date-time
          title: Created At
          type: string
        finished_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Finished At
        idempotency_key:
          title: Idempotency Key
          type: string
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        job_id:
          format: uuid
          title: Job Id
          type: string
        job_type:
          title: Job Type
          type: string
        last_error:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Error
        locked_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Locked At
        locked_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Locked By
        max_attempts:
          title: Max Attempts
          type: integer
        payload:
          additionalProperties: true
          title: Payload
          type: object
        priority:
          title: Priority
          type: integer
        started_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Started At
        status:
          title: Status
          type: string
      required:
      - job_id
      - ingest_run_id
      - job_type
      - status
      - priority
      - idempotency_key
      - payload
      - created_at
      - attempts
      - max_attempts
      - locked_by
      - locked_at
      - started_at
      - finished_at
      - last_error
      title: ConnectorReviewQueueItemResponse
      type: object
    ConnectorRunRequest:
      properties:
        connector_name:
          title: Connector Name
          type: string
        fixture_key:
          title: Fixture Key
          type: string
      required:
      - connector_name
      - fixture_key
      title: ConnectorRunRequest
      type: object
    ConnectorRunResultContract:
      properties:
        connector_name:
