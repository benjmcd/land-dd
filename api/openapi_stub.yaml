        running:
          title: Running
          type: integer
        succeeded:
          title: Succeeded
          type: integer
        total:
          title: Total
          type: integer
      required:
      - job_type
      - total
      - queued
      - running
      - succeeded
      - failed
      - cancelled
      - needs_review
      title: JobQueueHealthResponse
      type: object
