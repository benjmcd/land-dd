openapi: 3.1.0
info:
  title: Area Due-Diligence Compiler API
  version: 0.1.0
  description: Curated companion for the current MVP routes. FastAPI's generated
    OpenAPI schema is the runtime authority; this file is path/method drift-checked
    against it.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Service status }
  /version:
    get:
      summary: API version
      responses:
        '200': { description: Version payload }
  /areas:
    get:
      summary: List areas
      responses:
        '200': { description: Area list }
    post:
      summary: Create an area
      operationId: createArea
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Area' }
      responses:
        '201': { description: Area created }
        '422': { description: Invalid area contract }
  /sources:
    get:
      summary: List source registry entries
      responses:
        '200': { description: Source list }
    post:
      summary: Create source registry entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Source' }
      responses:
        '201': { description: Source created }
        '409': { description: Source already exists or conflicts }
        '422': { description: Invalid source contract }
  /evidence:
    get:
      summary: List evidence for an area
      parameters:
        - name: area_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Evidence list }
        '422': { description: Invalid area id }
  /report-runs:
    get:
      summary: List report runs
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - name: area_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: workspace_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: intent_code
          in: query
          required: false
          schema: { $ref: '#/components/schemas/IntentCode' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200': { description: Report run list }
        '401': { description: Missing request identity headers }
        '403': { description: Workspace filter does not match request identity }
    post:
      summary: Create a report run
      operationId: createReportRun
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [area_id, intent_code]
              properties:
                area_id: { type: string, format: uuid }
                intent_code: { $ref: '#/components/schemas/IntentCode' }
                workspace_id: { type: [string, "null"], format: uuid }
                requested_by: { type: [string, "null"], format: uuid }
                idempotency_key: { type: [string, "null"] }
      responses:
        '201': { description: Report run created }
        '401': { description: Missing request identity headers }
        '403': { description: Request scope does not match request identity }
        '422': { description: Invalid report request }
  /report-runs/jobs:
    post:
      summary: Queue an idempotent report run job
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [area_id, intent_code, idempotency_key]
              properties:
                area_id: { type: string, format: uuid }
                intent_code: { $ref: '#/components/schemas/IntentCode' }
                idempotency_key: { type: string }
                workspace_id: { type: [string, "null"], format: uuid }
                requested_by: { type: [string, "null"], format: uuid }
      responses:
        '202': { description: Report run job queued }
        '401': { description: Missing request identity headers }
        '403': { description: Request scope does not match request identity }
        '422': { description: Invalid report job request }
  /report-runs/jobs/{job_id}:
    get:
      summary: Get report run job
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Report run job }
        '404': { description: Report run job not found }
        '401': { description: Missing request identity headers }
        '422': { description: Invalid report run job id }
  /report-runs/jobs/execute-next:
    post:
      summary: Execute the next queued report run job
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worker_id]
              properties:
                worker_id: { type: string }
      responses:
        '200': { description: Executed report run job }
        '401': { description: Missing request identity headers }
        '404': { description: No queued report job available }
        '422': { description: Invalid worker request }
  /report-runs/jobs/{job_id}/requeue:
    post:
      summary: Requeue a failed report run job
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200': { description: Requeued report run job }
        '401': { description: Missing request identity headers }
        '404': { description: Report run job not found }
        '422': { description: Invalid requeue request }
  /report-runs/{report_run_id}:
    get:
      summary: Get report run
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - name: report_run_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Report run }
        '401': { description: Missing request identity headers }
        '404': { description: Report run not found }
        '422': { description: Invalid report run id }
  /report-runs/{report_run_id}/dossier:
    get:
      summary: Get approved Markdown dossier
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - $ref: '#/components/parameters/ReportRunId'
      responses:
        '200': { description: Approved report dossier as Markdown }
        '401': { description: Missing request identity headers }
        '404': { description: Report run not found }
        '409': { description: Report run is not approved for delivery }
        '422': { description: Invalid report run id }
  /report-runs/{report_run_id}/approve:
    post:
      summary: Approve report run for delivery
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - $ref: '#/components/parameters/ReportRunId'
      requestBody:
        $ref: '#/components/requestBodies/ReportReviewAction'
      responses:
        '200': { description: Updated report run }
        '401': { description: Missing request identity headers }
        '403': { description: Reviewer does not match request identity }
        '404': { description: Report run not found }
        '422': { description: Invalid report review action }
  /report-runs/{report_run_id}/reject:
    post:
      summary: Reject report run
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - $ref: '#/components/parameters/ReportRunId'
      requestBody:
        $ref: '#/components/requestBodies/ReportReviewAction'
      responses:
        '200': { description: Updated report run }
        '401': { description: Missing request identity headers }
        '403': { description: Reviewer does not match request identity }
        '404': { description: Report run not found }
        '422': { description: Invalid report review action }
  /report-runs/{report_run_id}/supersede:
    post:
      summary: Supersede approved report run
      parameters:
        - $ref: '#/components/parameters/ReportBearerToken'
        - $ref: '#/components/parameters/RequestWorkspaceId'
        - $ref: '#/components/parameters/RequestUserId'
        - $ref: '#/components/parameters/ReportRunId'
      requestBody:
        $ref: '#/components/requestBodies/ReportReviewAction'
      responses:
        '200': { description: Updated report run }
        '401': { description: Missing request identity headers }
        '403': { description: Reviewer does not match request identity }
        '404': { description: Report run not found }
        '422': { description: Invalid report review action }
  /connector-runs:
    post:
      summary: Run a static fixture connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [connector_name, fixture_key]
              properties:
                connector_name:
                  enum:
                    - fixture_access_static
                    - fixture_flood_static
                    - fixture_zoning_static
                fixture_key: { type: string }
      responses:
        '201': { description: Connector run result }
        '422': { description: Unsupported connector, fixture, or fixture provenance }
  /connector-review-queue:
    get:
      summary: List connector review queue items
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/JobStatus' }
        - name: connector_name
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200': { description: Connector review queue item list }
        '422': { description: Invalid queue filter }
  /connector-review-queue/{ingest_run_id}:
    get:
      summary: Get connector review queue item
      parameters:
        - name: ingest_run_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Connector review queue item }
        '404': { description: Connector review queue item not found }
        '422': { description: Invalid ingest run id }
  /connector-review-queue/{ingest_run_id}/approve:
    post:
      summary: Approve connector review queue item
      parameters:
        - $ref: '#/components/parameters/IngestRunId'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorReviewAction'
      responses:
        '200': { description: Updated connector review queue item }
        '404': { description: Connector review queue item not found }
        '422': { description: Invalid action request }
  /connector-review-queue/{ingest_run_id}/reject:
    post:
      summary: Reject connector review queue item
      parameters:
        - $ref: '#/components/parameters/IngestRunId'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorReviewAction'
      responses:
        '200': { description: Updated connector review queue item }
        '404': { description: Connector review queue item not found }
        '422': { description: Invalid action request }
  /connector-review-queue/{ingest_run_id}/requeue:
    post:
      summary: Requeue connector review queue item
      parameters:
        - $ref: '#/components/parameters/IngestRunId'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorReviewAction'
      responses:
        '200': { description: Updated connector review queue item }
        '404': { description: Connector review queue item not found }
        '422': { description: Invalid action request }
  /connector-review-queue/{ingest_run_id}/cancel:
    post:
      summary: Cancel connector review queue item
      parameters:
        - $ref: '#/components/parameters/IngestRunId'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorReviewAction'
      responses:
        '200': { description: Updated connector review queue item }
        '404': { description: Connector review queue item not found }
        '422': { description: Invalid action request }
components:
  parameters:
    ReportBearerToken:
      name: Authorization
      in: header
      required: false
      description: Required as `Bearer <token>` when `REPORT_AUTH_MODE=signed_token`.
      schema: { type: string }
    RequestWorkspaceId:
      name: X-Workspace-Id
      in: header
      required: false
      description: Required in `trusted_headers` mode; optional in signed-token mode when it matches the token claims.
      schema: { type: string, format: uuid }
    RequestUserId:
      name: X-User-Id
      in: header
      required: false
      description: Required in `trusted_headers` mode; optional in signed-token mode when it matches the token claims.
      schema: { type: string, format: uuid }
    IngestRunId:
      name: ingest_run_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReportRunId:
      name: report_run_id
      in: path
      required: true
      schema: { type: string, format: uuid }
  requestBodies:
    ReportReviewAction:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reviewer_id]
            properties:
              reviewer_id: { type: string }
              reason: { type: [string, "null"] }
    ConnectorReviewAction:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reviewer_id]
            properties:
              reviewer_id: { type: string }
              reason: { type: [string, "null"] }
              not_before: { type: [string, "null"], format: date-time }
  schemas:
    Area:
      type: object
      required: [geom_geojson]
      properties:
        area_id: { type: string, format: uuid }
        area_type:
          enum:
            - parcel_like
            - drawn_polygon
            - multi_polygon
            - locality
            - buffer
            - generated_candidate
        label: { type: [string, "null"] }
        geom_geojson: { type: object }
        geom_srid: { type: integer, default: 4326 }
        geom_source: { type: [string, "null"] }
        geom_validated: { type: boolean, default: false }
    Source:
      type: object
      required: [name, domain]
      properties:
        source_id: { type: string, format: uuid }
        name: { type: string }
        organization: { type: [string, "null"] }
        homepage_url: { type: [string, "null"], format: uri }
        domain: { type: string }
        authority_level: { type: string, default: unknown }
        review_status: { type: string, default: pending }
        metadata: { type: object }
    IntentCode:
      enum:
        - rural_land_purchase
        - homestead_feasibility
        - farmland
        - development
        - solar
        - data_center
        - conservation
        - mineral_resource_screen
        - speculative_hold
    JobStatus:
      enum:
        - queued
        - running
        - succeeded
        - failed
        - cancelled
        - needs_review
