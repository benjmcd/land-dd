        evidence_skipped:
          title: Evidence Skipped
          type: integer
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        queue_job_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Queue Job Id
        retrieval_status:
          title: Retrieval Status
          type: string
        review_required:
          title: Review Required
          type: boolean
      required:
      - ingest_run_id
      - connector_name
      - retrieval_status
      - evidence_created
      - evidence_skipped
      - review_required
      title: ConnectorRunResultContract
      type: object
    ConnectorRunReviewStatusResponse:
      properties:
        area_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Area Id
        connector_name:
          title: Connector Name
          type: string
        dataset_version_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Dataset Version Id
        disposition:
          title: Disposition
          type: string
        evidence_created_count:
          title: Evidence Created Count
          type: integer
        evidence_skipped_count:
          title: Evidence Skipped Count
          type: integer
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        priority:
          title: Priority
          type: string
        quality:
          $ref: '#/components/schemas/ConnectorFixtureQualityResponse'
        queue_name:
          title: Queue Name
          type: string
        retrieval_status:
          title: Retrieval Status
          type: string
        review_required:
          title: Review Required
          type: boolean
        signal_codes:
          items:
            type: string
          title: Signal Codes
          type: array
        source_failure_created_count:
          title: Source Failure Created Count
          type: integer
        source_failure_skipped_count:
          title: Source Failure Skipped Count
          type: integer
        summary:
          title: Summary
          type: string
        tasks:
          items:
            type: string
          title: Tasks
          type: array
        title:
          title: Title
          type: string
      required:
      - queue_name
      - disposition
      - priority
      - title
      - summary
      - connector_name
      - ingest_run_id
      - area_id
      - dataset_version_id
      - retrieval_status
      - review_required
      - evidence_created_count
      - evidence_skipped_count
      - source_failure_created_count
      - source_failure_skipped_count
      - signal_codes
      - tasks
      - quality
      title: ConnectorRunReviewStatusResponse
      type: object
    EvidenceContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        caveat:
          anyOf:
          - type: string
          - type: 'null'
          title: Caveat
        confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        dataset_version_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Dataset Version Id
        domain:
          title: Domain
          type: string
        evidence_code:
          title: Evidence Code
          type: string
        evidence_id:
          format: uuid
          title: Evidence Id
          type: string
        evidence_type:
          $ref: '#/components/schemas/EvidenceType'
          default: source_observation
        geometry_geojson:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Geometry Geojson
        geometry_srid:
          default: 4326
          title: Geometry Srid
          type: integer
        is_negative_evidence:
          default: false
          title: Is Negative Evidence
          type: boolean
        is_source_failure:
          default: false
          title: Is Source Failure
          type: boolean
        method_code:
          title: Method Code
          type: string
        method_version:
          default: 0.1.0
          title: Method Version
          type: string
        observation:
          title: Observation
          type: string
        observed_at:
          format: date-time
          title: Observed At
          type: string
        observed_value:
          additionalProperties: true
          title: Observed Value
          type: object
        source_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Date
        source_id:
          format: uuid
          title: Source Id
          type: string
        source_ingest_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Source Ingest Run Id
        spatial_precision_meters:
          anyOf:
          - minimum: 0.0
            type: number
          - type: 'null'
          title: Spatial Precision Meters
        superseded_by:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Superseded By
      required:
      - area_id
      - evidence_code
      - domain
      - observation
      - source_id
      - method_code
      title: EvidenceContract
      type: object
    EvidenceType:
      enum:
      - source_observation
      - spatial_intersection
      - derived_metric
      - document_extract
      - source_failure
      - human_verification
      - manual_note
      title: EvidenceType
      type: string
    FemaNfhlBboxRequest:
      properties:
        xmax:
          title: Xmax
          type: number
        xmin:
          title: Xmin
          type: number
        ymax:
          title: Ymax
          type: number
        ymin:
          title: Ymin
          type: number
      required:
      - xmin
      - ymin
      - xmax
      - ymax
      title: FemaNfhlBboxRequest
      type: object
    FemaNfhlQueryRequest:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        bbox:
          $ref: '#/components/schemas/FemaNfhlBboxRequest'
        max_features:
          default: 1000
          title: Max Features
          type: integer
      required:
      - area_id
      - bbox
      title: FemaNfhlQueryRequest
      type: object
    FemaNfhlQueryResponse:
      properties:
        connector_name:
          title: Connector Name
          type: string
        error_count:
          title: Error Count
          type: integer
        evidence_created_count:
          title: Evidence Created Count
          type: integer
        evidence_input_count:
          title: Evidence Input Count
          type: integer
        evidence_skipped_count:
          title: Evidence Skipped Count
          type: integer
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        queue_item_status:
          title: Queue Item Status
          type: string
        queue_name:
          title: Queue Name
          type: string
        request_url:
          title: Request Url
          type: string
        retrieval_status:
          title: Retrieval Status
          type: string
        review_required:
          title: Review Required
          type: boolean
        row_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Row Count
        source_failure_created_count:
          title: Source Failure Created Count
          type: integer
        source_failure_skipped_count:
          title: Source Failure Skipped Count
          type: integer
        source_registry_id:
          title: Source Registry Id
          type: string
      required:
      - connector_name
      - ingest_run_id
      - retrieval_status
      - row_count
      - error_count
      - evidence_input_count
      - evidence_created_count
      - evidence_skipped_count
      - source_failure_created_count
      - source_failure_skipped_count
      - review_required
      - queue_item_status
      - queue_name
      - source_registry_id
      - request_url
      title: FemaNfhlQueryResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    IntakeRequest:
      properties:
        area_geojson:
          additionalProperties: true
          title: Area Geojson
          type: object
        intent_code:
          $ref: '#/components/schemas/IntentCode'
      required:
      - area_geojson
      - intent_code
      title: IntakeRequest
      type: object
    IntakeResponse:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        connector_ingest_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Connector Ingest Run Id
        connector_review_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Connector Review Status
        report_run_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Report Run Id
        status:
          default: queued
          title: Status
          type: string
      required:
      - area_id
      title: IntakeResponse
      type: object
    IntentCode:
      description: 'Intent codes that drive report evaluation.


        Values must exactly match the core.intent_code SQL enum defined in

        db/migrations/0001_initial_spine.sql. Two intents are seeded in

        db/seeds/001_seed_intents.sql; others are defined for future use.


        Do not add or rename values here without a coordinated schema migration.'
      enum:
      - rural_land_purchase
      - homestead_feasibility
      - farmland
      - development
      - solar
      - data_center
      - conservation
      - mineral_resource_screen
      - speculative_hold
      title: IntentCode
      type: string
    JobQueueHealthResponse:
