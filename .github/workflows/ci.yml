name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Verify workspace and tests
        run: ./scripts/verify.sh

  db-verify:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: land
          POSTGRES_PASSWORD: land
          POSTGRES_DB: land_diligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U land -d land_diligence"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Verify workspace, tests, migrations, and DB smoke
        env:
          RUN_DB_SMOKE: '1'
          AUDIT_PURGE_TEST_DB_ISOLATED: '1'
          DATABASE_URL_SYNC: postgresql://land:land@localhost:5432/land_diligence
          DATABASE_URL: postgresql+psycopg://land:land@localhost:5432/land_diligence
        run: ./scripts/verify.sh

  qualification-selftest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Run qualification validator selftest
        run: ./scripts/run_qualification_selftest.sh
      - name: Validate qualification control plane
        run: ./scripts/run_qualification_validate.sh
      - name: Verify qualification status derivation
        run: ./scripts/run_qualification_status_check.sh
      - name: Report qualification change impact
        run: ./scripts/run_qualification_change_impact_check.sh
      - name: Validate qualification P0 auto evidence
        run: ./scripts/run_qualification_p0_evidence_check.sh
      - name: Validate qualification parameterization backlog
        run: ./scripts/run_qualification_parameterization_backlog_check.sh

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate production dependency provenance
        run: ./scripts/run_provenance_check.sh
      - name: Validate supply-chain proof
        run: ./scripts/run_supply_chain_check.sh
      - name: Install backend and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"
          python -m pip install pip-audit
      - name: Audit installed backend dependency environment
        run: pip-audit --local

  dependency-attestations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate production dependency provenance
        run: ./scripts/run_provenance_check.sh
      - name: Check GitHub attestation entitlement
        id: attestation-entitlement
        run: |
          if [ "${{ github.event.repository.private }}" = "false" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Dependency attestations blocked"
              echo ""
              echo "GitHub artifact attestations are not available for this private repository plan."
              echo "Dependency provenance artifacts were validated, but live GitHub attestations were skipped."
              echo "Make the repository public or move it to a supported GitHub Enterprise Cloud context to enable this gate."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Attest dependency provenance artifacts
        if: steps.attestation-entitlement.outputs.enabled == 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            backend/requirements-prod.lock
            docs/sbom/backend-prod-sbom.json
          create-storage-record: false
      - name: Attest backend dependency SBOM
        if: steps.attestation-entitlement.outputs.enabled == 'true'
        uses: actions/attest@v4
        with:
          subject-path: backend/requirements-prod.lock
          sbom-path: docs/sbom/backend-prod-sbom.json
          create-storage-record: false

  container-image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate container image scan proof
        run: ./scripts/run_container_scan_check.sh
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t land-diligence-backend:${{ github.sha }} .
      - name: Check Docker Scout entitlement
        id: scout-entitlement
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Container image scan blocked"
              echo ""
              echo "Docker Scout entitlement is not configured for this repository."
              echo "The backend image was built, but the live Scout CVE scan was skipped."
              echo "Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets to enable the fail-closed scan."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Scan backend image CVEs
        if: steps.scout-entitlement.outputs.enabled == 'true'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://land-diligence-backend:${{ github.sha }}
          only-severities: critical,high
          exit-code: true
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

  access-control:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate access-control posture
        run: ./scripts/run_access_control_check.sh

  image-publication:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate image publication boundary
        run: ./scripts/run_image_publication_check.sh

  hosted-deployment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate hosted deployment boundary
        run: ./scripts/run_hosted_deployment_check.sh

  release-readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Validate release readiness catalog
        run: ./scripts/run_release_readiness_check.sh

  release-package-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install static catalog parser
        run: python -m pip install PyYAML
      - name: Validate release package boundary
        run: ./scripts/run_release_package_check.sh
      - name: Build local release package
        run: ./scripts/build_release_package.sh "ci-${{ github.sha }}"
      - name: Validate generated package manifest
        run: ./scripts/run_package_manifest_check.sh "local_artifacts/releases/land-diligence-ci-${{ github.sha }}-release-manifest.json"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend and bandit
        run: |
          python -m pip install -e "backend[dev]"
          python -m pip install bandit
      - name: Run bandit security scan
        run: ./scripts/run_security_scan.sh
