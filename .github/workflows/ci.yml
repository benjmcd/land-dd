name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Verify workspace and tests
        run: ./scripts/verify.sh

  db-verify:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: land
          POSTGRES_PASSWORD: land
          POSTGRES_DB: land_diligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U land -d land_diligence"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install backend dev dependencies
        run: python -m pip install -e "backend[dev]"
      - name: Verify workspace, tests, migrations, and DB smoke
        env:
          RUN_DB_SMOKE: '1'
          DATABASE_URL_SYNC: postgresql://land:land@localhost:5432/land_diligence
        run: ./scripts/verify.sh
