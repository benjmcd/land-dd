services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: land_diligence
      POSTGRES_USER: land
      POSTGRES_PASSWORD: land
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U land -d land_diligence"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
