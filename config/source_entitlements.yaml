schema_version: source_entitlements_v1
operator_runbook: docs/runbooks/source_entitlements.md
status: repo_local_validate_only
validation: scripts/run_source_entitlement_check.ps1

sources:
  - source_registry_id: DS-017
    name: Commercial parcel vendor
    mvp_priority: Must
    current_decision_state: external_authority_required
    current_readiness: blocked
    source_registry_authority: registers/data_source_registry.csv
    source_readiness_authority: scripts/source_readiness.py
    production_authority_packet: state/PRODUCTION_AUTHORITY_PACKET.md
    blocked_registry_fields:
      - review_status
      - license_status
      - commercial_use_status
      - redistribution_status
      - cache_allowed
      - export_allowed
      - raw_data_allowed
      - ai_use_allowed
      - connector_implemented
    required_authority_fields:
      - vendor_entity
      - dataset_name
      - contract_or_terms_reference
      - terms_effective_date
      - allowed_geography
      - license_status
      - commercial_use_status
      - redistribution_status
      - cache_allowed
      - export_allowed
      - raw_data_allowed
      - ai_use_allowed
      - attribution_required
      - field_allowlist
      - field_denylist
      - entitlement_owner
      - workspace_entitlement_policy
      - report_entitlement_policy
      - export_entitlement_policy
      - cost_meter
      - billing_owner
      - connector_scope
      - failure_mode_mapping
    required_external_evidence:
      - reviewed_terms_or_redacted_contract_reference
      - vendor_product_or_dataset_name
      - allowed_geography_and_coverage_statement
      - source_version_or_effective_date
      - update_cadence_and_staleness_policy
      - field_allowlist_and_denylist
      - cache_ttl_or_no-cache_policy
      - export_policy
      - raw_data_retention_policy
      - ai_use_policy
      - attribution_policy
      - entitlement_owner_and_review_owner
      - per-report_paid_data_cost_policy
      - connector_scope_and_failure_mode_policy
    acceptable_outcomes:
      - id: approve_under_reviewed_contract
        meaning: >
          External authority approves a named vendor/product scope with explicit
          license, entitlement, field, cost, and connector decisions.
      - id: defer_or_remove_from_must_scope
        meaning: >
          Product authority decides DS-017 is not required for the next full-release
          gate and updates readiness/release artifacts without pretending approval.
      - id: substitute_public_official_sources
        meaning: >
          Product/source authority replaces DS-017 with approved public or official
          source coverage and records the resulting scope limits.
    forbidden_outputs_until_approved:
      - owner_name
      - owner_mailing_address
      - situs_address
      - raw_vendor_record
      - assessed_value
      - market_value
      - sale_or_comps_data
      - title_status
      - legal_access
      - buildability_conclusion
      - appraisal_or_lending_suitability
      - investment_recommendation
    failure_modes_required:
      - auth_failure
      - license_blocked
      - quota_exceeded
      - rate_limited
      - stale_data
      - vendor_outage
      - no_coverage
      - ambiguous_parcel_match
      - partial_response
      - schema_drift
      - no_data
    repo_lanes_unlocked_only_after_authority:
      - source_review
      - registry_seed_update
      - entitlement_model_tests
      - cost_metering
      - connector_design
      - approved_connector_slice

limits:
  approves_sources: false
  selects_vendor: false
  implements_connector: false
  generates_artifacts: false
  calls_live_vendor: false
  changes_source_readiness: false
