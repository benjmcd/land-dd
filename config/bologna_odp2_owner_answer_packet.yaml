  - state/PRODUCTION_AUTHORITY_PACKET.md

approvals:
  owner_answer_recorded: false
  source_authority_recorded: false
  source_rights_approved: false
  bsa001_unblocked: false
  source_registry_promotion_allowed: false
  recorded_corpus_allowed: false
  db_report_proof_allowed: false
  downstream_authority_updates_allowed: false

limits:
  validate_only_answer_packet: true
  records_owner_answer: false
  records_source_authority: false
  approves_sources: false
  changes_source_rights: false
  promotes_source_registry: false
  creates_recorded_fixtures: false
  creates_source_failure_fixtures: false
  runs_live_connectors: false
  mutates_database: false
  creates_runtime_artifacts: false
  creates_report_artifacts: false
  changes_report_semantics: false
  changes_source_readiness: false
  approves_ds017: false
  claims_cadastral_authority: false
  claims_legal_review: false
  claims_hosted_production_ready: false
  claims_multi_geography_framework: false
  claims_level_10: false

packet:
  odp_id: ODP-BOL-002
  title: Bologna source authority and rights owner-answer packet
  sequence: 2
  source_owner_answer_intake: config/bologna_owner_answer_intake.yaml
  source_scope_authority_gate: config/bol_scope_auth.yaml
  source_response_gate: config/bologna_odp2_source_rights_response_gate.yaml
  source_authority_intake: config/bologna_source_authority_intake.yaml
  source_rights_matrix: config/bologna_source_rights.yaml
  prerequisite_odp_ids:
    - ODP-BOL-001
  prerequisite_status: missing_pilot_scope_authority
  current_owner_answer_references: []
  current_source_authority_record_references: []
  current_source_rights_approval_references: []
  owner_answer_template:
    owner_answer_id: OWNER_TO_PROVIDE
    odp_id: ODP-BOL-002
    answer_type: OWNER_TO_SELECT
    decision_owner: OWNER_TO_PROVIDE
    decision_date: OWNER_TO_PROVIDE_ISO_DATE
    authority_reference: OWNER_TO_PROVIDE_CITED_RECORD
    answer_summary: OWNER_TO_PROVIDE
    cited_artifacts: []
    caveats: []
    downstream_unlocks_requested: []
    supersedes_owner_answer_ids: []
  source_authority_record_template:
    source_authority_record_id: OWNER_TO_PROVIDE
    authority_type: OWNER_TO_SELECT
    candidate_id: OWNER_TO_PROVIDE
    scope_authority_record_ids: []
    authority_reference: OWNER_TO_PROVIDE_CITED_RECORD
    decision_owner: OWNER_TO_PROVIDE
    decision_date: OWNER_TO_PROVIDE_ISO_DATE
    effective_date: OWNER_TO_PROVIDE_ISO_DATE
    rights_decision_ids:
      - terms_reference
      - terms_effective_date
      - source_version_or_publication_date
      - update_cadence
      - license_status
      - commercial_use_status
      - redistribution_status
      - cache_allowed
      - export_allowed
      - raw_data_allowed
      - ai_use_allowed
      - attribution_required
      - retrieval_metadata_policy
      - source_failure_policy
      - no_data_policy
      - caveat_policy
      - crs_precision_policy
      - field_allowlist
      - field_denylist
      - fixture_capture_policy
      - report_use_policy
    evidence_slot_values: {}
    source_terms_summary: OWNER_TO_PROVIDE
    source_version_or_publication_date: OWNER_TO_PROVIDE
    retrieval_metadata_policy: OWNER_TO_PROVIDE
    cache_export_ai_raw_data_decisions: OWNER_TO_PROVIDE
    crs_precision_policy: OWNER_TO_PROVIDE
    attribution_text: OWNER_TO_PROVIDE
    caveats: []
    storage_export_boundaries: OWNER_TO_PROVIDE
    source_failure_policy: OWNER_TO_PROVIDE
    downstream_unlocks_requested: []
    supersedes_source_authority_record_ids: []
  allowed_answer_types:
    - approve_with_cited_authority
    - keep_blocked
    - approve_review_only
    - exclude_or_defer
  allowed_source_authority_types:
    - candidate_source_terms_review
    - cadastral_source_terms_review

candidate_review_checklist:
