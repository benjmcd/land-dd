    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - effective_pug_document_or_webgis_version
      - terms_or_reuse_reference
      - allowed_cache_export_ai_raw_data_decisions
      - attribution_text
      - planning_context_caveats

  - candidate_id: comune_bologna_open_data_pug_constraints
    status: awaiting_owner_response
    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - exact_dataset_identifier
      - dataset_license_and_terms_reference
      - source_version_or_update_timestamp
      - attribution_text
      - environmental_or_constraint_screening_caveats

  - candidate_id: rer_geoportale_dbtr_altimetry
    status: awaiting_owner_response
    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - exact_layer_metadata
      - license_and_attribution_mapping
      - source_version_or_update_timestamp
      - crs_and_precision_decision
      - terrain_context_caveats

  - candidate_id: rer_geoportale_catalog_services
    status: awaiting_owner_response
    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - exact_layer_selection
      - per_layer_license_and_terms_reference
      - source_version_or_update_timestamp
      - service_or_download_retrieval_policy
      - layer_specific_caveats

  - candidate_id: rer_crs_reference
    status: awaiting_owner_response
    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - official_crs_reference
      - transformation_policy
      - geometry_precision_policy
      - fixture_crs_metadata_policy
      - reference_not_report_claim_caveat

  - candidate_id: arpae_cartographic_portal
    status: awaiting_owner_response
    decision_state: pending_external_review
    source_authority_record_required: true
    required_evidence:
      - exact_environmental_layer_selection
      - layer_metadata_and_terms_reference
      - source_version_or_update_timestamp
      - environmental_screening_caveats
      - no_jurisdiction_or_liability_claim_policy

  - candidate_id: cadastral_gap
    status: awaiting_owner_response
    decision_state: direct_source_review_required
    source_authority_record_required: true
    required_evidence:
      - official_terms_reference
      - allowed_access_method
      - cache_export_ai_raw_data_decisions
      - cadastral_geometry_precision_and_caveats
      - explicit_no_owner_title_access_buildability_authority

rights_decision_checklist:
  - decision_id: terms_reference
    status: awaiting_owner_response
    owner_question: What exact terms, license, or reuse reference governs each source?
    must_cite: [source terms URL or document, retrieval date, candidate source ID]
    consequence_if_missing: Source review remains pending and no source can enter a corpus.
  - decision_id: terms_effective_date
    status: awaiting_owner_response
    owner_question: What effective date or version date applies to each source terms reference?
    must_cite: [effective date, publication timestamp, evidence artifact]
    consequence_if_missing: Source lineage and future reproducibility remain blocked.
  - decision_id: source_version_or_publication_date
    status: awaiting_owner_response
    owner_question: What source data version, publication date, or update timestamp is authorized?
    must_cite: [source version, data publication date, retrieval metadata policy]
    consequence_if_missing: Recorded-source corpus manifests remain blocked.
  - decision_id: update_cadence
    status: awaiting_owner_response
    owner_question: What update cadence or refresh caveat applies to each source?
    must_cite: [official cadence statement, unknown cadence caveat, review owner]
    consequence_if_missing: Freshness caveats and as-of policy remain blocked.
  - decision_id: license_status
    status: awaiting_owner_response
    owner_question: Is the source license approved, restricted, unknown, or incompatible?
    must_cite: [license text, reviewer decision, incompatible-use caveat if any]
    consequence_if_missing: Source approval remains impossible.
  - decision_id: commercial_use_status
    status: awaiting_owner_response
    owner_question: What commercial or paid-use status applies to each source?
    must_cite: [terms clause, allowed use, prohibited use]
    consequence_if_missing: Runtime/report and export use remain blocked.
  - decision_id: redistribution_status
    status: awaiting_owner_response
    owner_question: What redistribution status applies to raw, normalized, and report artifacts?
    must_cite: [redistribution clause, storage/export boundary, attribution text]
    consequence_if_missing: Artifact storage and export remain blocked.
  - decision_id: cache_allowed
    status: awaiting_owner_response
    owner_question: May the source be cached locally for fixture or evidence review?
    must_cite: [cache permission, retention limit, deletion or refresh boundary]
    consequence_if_missing: Recorded fixture capture remains blocked.
  - decision_id: export_allowed
    status: awaiting_owner_response
    owner_question: May normalized or derived records be exported from the local system?
    must_cite: [export permission, field boundary, attribution requirement]
    consequence_if_missing: Report artifacts and operator exports remain blocked.
  - decision_id: raw_data_allowed
    status: awaiting_owner_response
    owner_question: May raw source payloads be retained, stored, or exposed?
    must_cite: [raw retention rule, storage boundary, review caveat]
    consequence_if_missing: Raw data retention and source-failure fixture policy remain blocked.
  - decision_id: ai_use_allowed
    status: awaiting_owner_response
    owner_question: May source content be used in AI-assisted extraction or summaries?
    must_cite: [AI-use permission, prohibited-use caveat, non-training boundary]
    consequence_if_missing: Any AI-assisted workflow remains blocked.
  - decision_id: attribution_required
    status: awaiting_owner_response
    owner_question: What attribution text and placement are required for each source?
    must_cite: [attribution text, placement rule, source owner]
    consequence_if_missing: Report and corpus publication remain blocked.
  - decision_id: retrieval_metadata_policy
    status: awaiting_owner_response
    owner_question: What retrieval metadata must be stored for each source?
    must_cite: [retrieval timestamp policy, URL or request metadata, version fields]
    consequence_if_missing: Evidence lineage remains incomplete.
  - decision_id: source_failure_policy
    status: awaiting_owner_response
    owner_question: How are unavailable, ambiguous, stale, or failed source responses recorded?
    must_cite: [failure taxonomy, fixture policy, caveat text]
    consequence_if_missing: Source failures cannot become first-class evidence.
  - decision_id: no_data_policy
    status: awaiting_owner_response
    owner_question: How should no-data or not-applicable source responses be represented?
    must_cite: [no-data vocabulary, caveat rule, evidence treatment]
    consequence_if_missing: Unknowns and source absence can be overstated.
  - decision_id: caveat_policy
    status: awaiting_owner_response
    owner_question: What caveats must accompany each source and source-derived claim?
    must_cite: [source caveats, report caveat placement, prohibited claim list]
    consequence_if_missing: Report wording and claim generation remain blocked.
  - decision_id: crs_precision_policy
    status: awaiting_owner_response
    owner_question: What CRS and spatial precision rules apply to each source?
    must_cite: [official CRS reference, transformation policy, precision caveat]
    consequence_if_missing: Geometry use, lineage, and report maps remain blocked.
  - decision_id: field_allowlist
    status: awaiting_owner_response
    owner_question: Which source fields may be stored, normalized, and cited?
    must_cite: [allowed field list, reason for inclusion, source contract reference]
    consequence_if_missing: Source contract completeness remains blocked.
  - decision_id: field_denylist
    status: awaiting_owner_response
    owner_question: Which source fields must be excluded from storage, export, or reports?
    must_cite: [denied field list, privacy or rights reason, enforcement boundary]
    consequence_if_missing: Storage/export boundaries remain blocked.
  - decision_id: fixture_capture_policy
    status: awaiting_owner_response
    owner_question: What recorded fixture and source-failure fixture capture policy is approved?
    must_cite: [fixture scope, retention policy, source-failure fixture policy]
    consequence_if_missing: Recorded-source corpus capture remains blocked.
  - decision_id: report_use_policy
    status: awaiting_owner_response
    owner_question: What report-use boundary applies to each approved source?
    must_cite: [report-use permission, caveat placement, no-overclaim reviewer]
    consequence_if_missing: DB-backed Bologna report proof remains blocked.

outcome_policy:
  - answer_type: approve_with_cited_authority
    packet_effect: Future slice may record a cited ODP-BOL-002 owner answer after ODP-BOL-001 authority is also cited.
    downstream_updates_allowed: false
  - answer_type: keep_blocked
    packet_effect: Future slice may record that Bologna source authority and rights remain blocked.
    downstream_updates_allowed: false
  - answer_type: approve_review_only
    packet_effect: Future slice may record review-only source-rights posture while keeping runtime, source, corpus, and report work blocked.
    downstream_updates_allowed: false
  - answer_type: exclude_or_defer
    packet_effect: Future slice may record Bologna source authority and rights as deferred or out of current scope.
    downstream_updates_allowed: false

downstream_blocked_targets:
  - config/bologna_source_rights.yaml
  - config/bologna_recorded_source_corpus.yaml
  - config/bologna_odp3_corpus_response_gate.yaml
  - config/bologna_odp4_db_report_proof_response_gate.yaml
  - db/migrations
  - db/seeds
  - backend/app/reports
  - backend/app/api

submission_policy:
  owner_answer_submission_target: config/bologna_owner_answer_intake.yaml
  source_authority_record_submission_target: config/bologna_source_authority_intake.yaml
  source_rights_submission_target: config/bologna_source_rights.yaml
  current_owner_answer_references_must_remain_empty: true
  current_source_authority_records_must_remain_empty: true
  current_source_rights_approval_references_must_remain_empty: true
  downstream_updates_allowed_by_packet: false
  requires_odp_bol_001_cited_authority_first: true
  requires_later_recording_slice: true

no_overclaim_controls:
  no_authority_by_packet: true
  no_source_authority_record_by_packet: true
  no_source_approval_by_packet: true
  no_source_rights_change_by_packet: true
  no_source_registry_promotion_by_packet: true
  no_fixture_capture_by_packet: true
  no_report_runtime_use_by_packet: true
  no_db_seed_by_packet: true
  no_cadastral_owner_title_access_buildability_claim: true
  no_legal_buildability_title_or_value_claim: true
  no_level_10_or_hosted_claim: true
