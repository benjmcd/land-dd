    - claim_id
    - area_id
    - claim_code
    - domain
    - assertion
    - user_safe_language
    - severity
    - confidence
    - evidence_ids
    - rule_code
    - ruleset_id
    - ruleset_version
    - verification_required
    - verification_task
  response_acceptance:
    - ODP-BOL-001 has cited product, one-AOI, jurisdiction, runtime, and no-overclaim authority first.
    - ODP-BOL-002 has cited per-source source-authority and source-rights authority first.
    - ODP-BOL-003 has cited recorded-source corpus authority first.
    - owner answer cites external report-proof authority, not repo-local inference.
    - response covers every required report-proof field.
    - response cites the report-run, evidence, and claim contracts used by the proof.
    - response preserves evidence ledger rows, claim-evidence links, unknowns, caveats, artifacts, source lineage, report-use policy, and storage/export boundaries.
    - owner answer requests no downstream unlocks in this gate.
    - no DB seed, DB report run, runtime artifact, report artifact, API surface, hosted, or Level 10 artifact changes are bundled into the response.
  still_blocked_after_valid_response:
    - recording the ODP-BOL-004 owner answer in a later authority slice
    - DB seed and DB report run until report-proof authority is recorded separately
    - report/API/runtime artifacts until separately authorized
    - DS-017 vendor/license/cost decision unless separately authorized
    - hosted platform and Level 10 production authority

report_proof_requirements:
  - field_id: one_local_db_report_run_id
    owner_question: What exact local DB-backed report run proves the Bologna pilot report?
    must_cite: [report_run_id, database environment, run timestamp, reproducibility boundary]
    consequence_if_missing: DB-backed report proof remains unverifiable.
  - field_id: approved_corpus_reference
    owner_question: Which ODP-BOL-003 recorded-source corpus authority supports this report proof?
    must_cite: [recorded corpus authority reference, corpus manifest reference, source version scope]
    consequence_if_missing: Report proof remains blocked behind corpus authority.
  - field_id: evidence_ledger_rows
    owner_question: Which stored evidence rows support the report proof?
    must_cite: [evidence row identifiers, source references, retrieval metadata, caveats]
    consequence_if_missing: Claims cannot be traced to stored evidence.
  - field_id: claim_evidence_links
    owner_question: How does each material claim cite stored evidence?
    must_cite: [claim identifiers, evidence identifiers, rule or method references]
    consequence_if_missing: No evidence, no claim remains unenforced for the proof.
  - field_id: unknowns_list
    owner_question: Which unknowns and no-data outcomes are preserved in the report proof?
    must_cite: [unknown claim rows, no-data vocabulary, verification tasks]
    consequence_if_missing: Unknowns may be overstated as clear findings.
  - field_id: caveats_list
    owner_question: Which source, method, jurisdiction, and report caveats accompany the proof?
    must_cite: [caveat text, source caveats, prohibited-claim checklist]
    consequence_if_missing: Report proof may imply legal/title/access/buildability/value conclusions.
  - field_id: artifact_manifest
    owner_question: Which report artifacts are in scope, and what are their hashes or storage references?
    must_cite: [machine JSON, human-readable artifact, artifact hash or URI, retention rule]
    consequence_if_missing: Artifact handoff and reproducibility remain blocked.
  - field_id: source_lineage
    owner_question: How is source lineage preserved from source version through evidence row to claim?
    must_cite: [source IDs, dataset versions, retrieval metadata, source ingest run IDs]
    consequence_if_missing: Report attribution and replay remain blocked.
  - field_id: report_use_policy
    owner_question: What report-use boundary applies to this DB-backed proof?
    must_cite: [evidence-only or rulepack boundary, report-use permission, downstream prohibition]
    consequence_if_missing: Runtime/report publication remains blocked.
  - field_id: no_overclaim_review
    owner_question: Who confirms the report proof avoids legal/title/access/buildability/value overclaims?
    must_cite: [review owner, prohibited-claim checklist, caveat placement]
    consequence_if_missing: Report proof cannot be claimed as reviewed.
  - field_id: storage_export_boundaries
    owner_question: What storage, retention, raw export, and normalized export limits apply?
    must_cite: [storage scope, export rights, retention policy, source-license restrictions]
    consequence_if_missing: DB/report artifact export remains blocked.

