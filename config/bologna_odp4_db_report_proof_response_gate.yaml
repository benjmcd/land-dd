    - evidence_ledger_rows
    - claim_evidence_links
    - unknowns_list
    - caveats_list
    - artifact_manifest
    - source_lineage
    - report_use_policy
    - no_overclaim_review
    - storage_export_boundaries
  required_report_run_contract_fields:
