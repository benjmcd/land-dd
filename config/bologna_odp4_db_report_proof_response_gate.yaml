  status: blocked_until_odp_bol_001_odp_bol_002_and_odp_bol_003
  source_owner_answer_intake: config/bologna_owner_answer_intake.yaml
  source_odp3_gate: config/bologna_odp3_corpus_response_gate.yaml
  source_report_run_schema: schemas/report_run_schema.json
  source_evidence_schema: schemas/evidence_schema.json
  source_claim_schema: schemas/claim_schema.json
  prerequisite_odp_ids:
    - ODP-BOL-001
    - ODP-BOL-002
    - ODP-BOL-003
  prerequisite_status: missing_required_authority
  current_owner_answer_references: []
  current_report_proof_authority_references: []
