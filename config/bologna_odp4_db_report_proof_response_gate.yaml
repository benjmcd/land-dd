outcome_matrix:
  - answer_type: approve_with_cited_authority
    expected_effect: A later slice may record the cited ODP-BOL-004 owner answer after ODP-BOL-001, ODP-BOL-002, and ODP-BOL-003 are also cited.
    downstream_updates_allowed: false
    still_disallowed: [DB seed, DB report run, report artifact, API surface, hosted or Level 10 claim]
  - answer_type: keep_blocked
    expected_effect: Bologna DB-backed report proof remains blocked with an explicit owner answer.
    downstream_updates_allowed: false
    still_disallowed: [DB-backed report proof, report artifact, API surface]
  - answer_type: approve_review_only
    expected_effect: A later slice may record review-only report-proof posture but still must not authorize DB mutation, runtime, report, API, or hosted use.
    downstream_updates_allowed: false
    still_disallowed: [DB seed, runtime use, report use, API surface]
  - answer_type: exclude_or_defer
    expected_effect: Bologna DB-backed report proof remains deferred or out of current scope until a new owner decision supersedes it.
    downstream_updates_allowed: false
    still_disallowed: [DB-backed report artifact, multi-geography framework claim, hosted proof]

