schema_version: data_retention_v1
operator_runbook: docs/runbooks/data_retention.md
retention_classes:
  - id: report_runs
    description: Completed report run records in reports.report_runs
    retention_period: indefinite_mvp
    deletion_approach: manual_operator
    data_sensitivity: internal_operational
    blocker: No automated deletion yet; retain all for reproducibility in MVP scope
  - id: evidence_observations
    description: Evidence records in evidence.observations
    retention_period: indefinite_mvp
    deletion_approach: manual_operator
    data_sensitivity: internal_operational
    blocker: Deleting evidence breaks report reproducibility; MVP retains all
  - id: audit_events
    description: "Audit events in audit.events (evidence lifecycle: created, superseded)"
    retention_period: 90_days_target
    deletion_approach: automated_script_dry_run_default
    purge_script: scripts/purge_audit_events.py
    purge_invocation: manual_operator
    data_sensitivity: internal_audit
    blocker: Repo-local purge command and schedule contract exist; hosted scheduler not provisioned
  - id: connector_review_queue
    description: Connector review queue items in jobs.job_queue (type=connector_review_status)
    retention_period: indefinite_mvp
    deletion_approach: manual_operator
    data_sensitivity: internal_operational
    blocker: Queue items needed for lineage tracing; MVP retains all
  - id: job_queue_report_jobs
    description: Report job records in jobs.job_queue (type=report_run)
    retention_period: indefinite_mvp
    deletion_approach: manual_operator
    data_sensitivity: internal_operational
    blocker: Job records needed for retry lineage; MVP retains all
  - id: source_ingest_runs
    description: Source retrieval run records in source.ingest_runs
    retention_period: indefinite_mvp
    deletion_approach: manual_operator
    data_sensitivity: internal_operational
    blocker: Ingest run records are connector provenance authority; MVP retains all
  - id: api_key_audit_events
    description: API key auth events in audit.events (event_type=api_key_auth)
    retention_period: 90_days_target
    deletion_approach: automated_script_dry_run_default
    purge_script: scripts/purge_audit_events.py
    purge_invocation: manual_operator
    data_sensitivity: internal_security_audit
    blocker: Repo-local purge command and schedule contract exist; hosted scheduler not provisioned
automation_plan:
  status: repo_local_schedule_contract
  runner: scripts/purge_audit_events.py
  windows_dry_run_wrapper: scripts/run_purge_audit_events.ps1
  posix_dry_run_wrapper: scripts/run_purge_audit_events.sh
  cadence: weekly
  mode: dry_run_by_default
  target_retention_classes:
    - audit_events
    - api_key_audit_events
  target_event_types:
    - api_key_auth
    - created
    - superseded
  apply_requires:
    - --apply
    - security_reviewer_approval
    - backup_or_export
    - state_worklog_entry
  hosted_scheduler_status: blocked
  limits:
    validate_only_catalog: true
    deletes_by_default: false
    requires_explicit_apply: true
    writes_secrets: false
retention_blockers:
  - id: automated_deletion
    status: blocked
    reason: Repo-local audit purge command and schedule contract exist; hosted scheduler and automatic approval workflow are not provisioned
  - id: hosted_log_retention
    status: blocked
    reason: Hosted log retention system not yet provisioned
