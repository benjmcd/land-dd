private_mvp_beta:

  geography_selected:
    status: complete
    evidence: state/OPEN_QUESTIONS.md (Decided section, item 1)
    note: >
      North Carolina — Buncombe, Chatham, and Brunswick counties accepted as
      private MVP geography on 2026-06-06.

  county_manifests_present:
    status: complete
    evidence: >
      docs/geographies/nc/buncombe/source_manifest.md,
      docs/geographies/nc/chatham/source_manifest.md,
      docs/geographies/nc/brunswick/source_manifest.md
    note: >
      County source manifests record official data portals, per-domain queryability
      class, source authority level, known caveats, and report caveat text for
      each of the three selected NC counties.

  golden_aoi_fixture_manifest:
    status: complete
    evidence: >
      tests/fixtures/golden_aois/manifest.yaml, tests/fixtures/golden_aois/*.geojson (9 cases),
      backend/tests/test_golden_aoi_manifest.py
    note: >
      Nine golden AOI fixture cases (3 per county) covering the full stress-case
      set. Manifest includes connector fixture file references, expected domains,
      NOT_EVALUATED domains, forbidden claim phrases, and expected caveats.
      Required before DB-backed regression proof.

  fixture_regression_path:
    status: complete
    evidence: >
      backend/tests/private_mvp/test_mvp_regression.py
      (RUN_DB_SMOKE=1-gated; uses InMemory repos; 9 AOI cases covering all
      golden AOIs: Buncombe bun_slope/bun_access/bun_flood, Chatham
      cha_rural_use/cha_zoning_edge/cha_parcel_tax, Brunswick
      bru_coastal_flood/bru_jurisdiction/bru_wetlands_soils), plus
      backend/tests/private_mvp/test_utility_closure.py
      (RUN_DB_SMOKE=1-gated; Chatham parcel fixture utility and Brunswick
      wetlands/soils fixture utility). Tests assert explicit NOT_EVALUATED
      unknowns where applicable and no forbidden phrases.
    note: >
      Fixture-backed regression and utility-closure tests exercise connector ingest
      workflows and report shape in in-memory repositories. NOT a DB-backed
      regression. See db_backed_regression_path for DB-backed approval-gate proof.

  db_backed_regression_path:
    status: complete
    evidence: >
      backend/tests/api/test_report_runs_db.py
      (test_db_backed_full_reviewed_dossier_path, RUN_DB_SMOKE=1-gated;
      uses SqlAlchemyReportRunRepository + real Postgres; proves full path:
      POST /areas → POST /report-runs → GET /dossier 409 → POST /approve →
      GET /dossier 200 with Markdown → DB row confirms status=succeeded + artifact present
      → API reload confirms review_status=approved, reviewed_by=fixture-reviewer),
      plus backend/tests/api/test_operator_cases_db.py
      (test_db_operator_case_report_persists_selected_county_fixture, RUN_DB_SMOKE=1-gated;
      parametrized all nine packaged selected-county operator cases:
      BUN-slope, BUN-flood, BUN-access, CHA-rural-use, CHA-zoning-edge,
      CHA-parcel-tax, BRU-coastal-flood, BRU-wetlands-soils, and
      BRU-jurisdiction; proves /operator-cases/{case_id}/report
      persists approved report/artifact state, selected-county evidence, and
      connector-review handoff rows through SqlAlchemy + real Postgres;
      test_db_supported_aoi_report_persists_existing_area_fixture proves
      /operator-cases/supported-aoi/report persists an approved fixture-profile
      selected-county report/artifact against an existing operator-supplied
      area_id without accepting a packaged case_id;
      test_db_ui_operator_case_report_persists_selected_county_fixture proves
      the /ui/operator-cases/report launcher redirects to the approved report UI
      and serves the persisted postgres+object_store artifact;
      test_db_ui_supported_aoi_report_persists_existing_area_fixture proves
      the /ui/operator-cases/supported-aoi/report launcher redirects to the approved
      report UI and serves the persisted postgres+object_store artifact for an
      existing supported AOI area_id)
    note: >
      Full AOI-to-approved-dossier DB-backed path proven, plus all nine packaged
      selected-county operator cases proven through the DB-backed
      /operator-cases/{case_id}/report path, one DB-backed supported-AOI area-ID
      route proof for /operator-cases/supported-aoi/report, one DB-backed UI
      launcher proof for /ui/operator-cases/report, and one DB-backed supported-AOI
      UI launcher proof for /ui/operator-cases/supported-aoi/report. The tests exercise
      SqlAlchemy persistence,
      the approval gate (pre-approval 409, post-approval 200 for the generic
      dossier path), selected-county persisted evidence/artifacts, approved UI
      delivery links, and DB reload behavior. This does not prove full hosted
      production or live-source production coverage.

  ds010_011_023_selected_county_behavior:
    status: complete
    evidence: >
      scripts/source_readiness.py --priority Must --json (DS-010 aggregate
      connector_names: chatham_parcels_live, buncombe_parcels_live,
      brunswick_parcels_live; DS-023 aggregate connector_names:
      chatham_zoning_udo_recorded, brunswick_zoning_udo_recorded),
      backend/app/source_registry/connector_inventory.py,
      backend/app/connectors/assessor_not_evaluated.py,
      tests/fixtures/golden_aois/manifest.yaml,
      backend/tests/private_mvp/test_utility_closure.py
    note: >
      DS-010 selected-county parcel connectors are ready for
      Buncombe/Chatham/Brunswick immediate operator API and request-time
      orchestration, with no owner/value/title fields and no durable live-job
      support claim. All 9 golden AOI fixture cases carry parcel fixtures;
      parcels is not NOT_EVALUATED for any Buncombe, Chatham, or Brunswick
      golden AOI. Buncombe parcel fixtures record parcel_zoning=null (the Buncombe
      County GIS parcel layer does not expose a zoning field). Brunswick parcel
      fixtures record parcel_zoning from the GIS layer (RA or R-20 per case;
      the Brunswick GIS parcel layer exposes a Zoning field).
      DS-011 uses the AssessorNotEvaluatedConnector sentinel only; no live
      assessor portal, owner, value, or sale-history data is asserted.
      DS-023 is ready only for Chatham/Brunswick recorded-fixture UDO district
      lookup; Buncombe zoning, live PDF ingestion, full-text redistribution, and
      legal zoning interpretation remain out of scope.

  ds010_source_review_gate:
    status: complete
    evidence: >
      backend/app/reports/service.py (_is_report_approved_evidence: checks source.review_status
      against _SOURCE_APPROVED_STATUSES before connector review queue check;
      fixture evidence with source_ingest_run_id=None bypasses gate by design)
    note: >
      Live connector evidence is blocked from reports unless the registered source has
      review_status in {approved, approved_with_restrictions, approved-with-restrictions}.
      Applies only to connector-backed evidence (source_ingest_run_id set); fixture-backed
      evidence (source_ingest_run_id=None) is approved unconditionally for private MVP.

  unauthenticated_workspace_isolation:
    status: complete
    evidence: >
      backend/app/api/reports.py (_optional_report_auth_context local-app-env guard);
      backend/tests/api/test_report_auth.py
      (test_report_create_route_requires_workspace_identity_in_non_local_env)
    note: >
      The anonymous async report-create fallback is now limited to local/dev/development/test
      APP_ENV values for private-MVP ergonomics. In non-local APP_ENV values, missing
      workspace/user identity delegates to the configured report auth mode and fails closed
      before report creation; signed-token mode keeps its existing bearer-token enforcement.

  sync_async_create_divergence:
    status: complete
    evidence: backend/app/api/reports.py and backend/app/reports/job_store.py
      (authenticated create queues durable async report jobs with workspace/requester
      attribution)
    risk: >
      Resolved for the active POST /report-runs surface. Authenticated and
      unauthenticated report creation now return AsyncReportRunResponse: 202 ACCEPTED
      on first queueing and 200 OK on Idempotency-Key replay.
    note: >
      Signed-token replay remains scoped to the authenticated workspace and user.
      The async job store carries workspace_id and requested_by through both
      in-memory and SQLAlchemy-backed job records, and background report creation
      uses that attribution for the eventual ReportRunContract.

  ds017_not_required:
    status: complete
    evidence: registers/data_source_registry.csv (DS-017 row; Caveats column)
    note: >
      DS-017 commercial parcel vendor is blocked (license/cost). Not required
      for private MVP utility proof; public/official county sources and
      NOT_EVALUATED sentinels are sufficient for the selected NC counties.

  markdown_dossier_delivery:
    status: complete
    evidence: >
      backend/app/api/reports.py (GET /{id}/dossier, 409 approval gate),
      backend/app/api/ui.py (UI route enforces same approval gate),
      backend/tests/api/test_report_dossier.py (5 tests including 409 guard),
      backend/tests/api/test_ui_routes.py (approval gate tests: unapproved→pending page, approved→dossier),
      backend/tests/api/test_report_auth.py (wrong-workspace 404 for dossier/lineage/compare/diff)
    note: >
      Approved report runs served as Markdown rural land dossiers via the API and UI.
      Both API (/dossier endpoint) and web UI (/ui/report-runs/{id}) enforce the approval
      gate. Wrong-workspace tokens receive 404 on all report-adjacent routes.
      Proven via DB-backed MVP regression (db_backed_regression_path).

  overclaim_checks:
    status: complete
    evidence: >
      backend/tests/reports/test_report_overclaim.py (4 overclaim tests covering FORBIDDEN_PHRASES),
      backend/tests/reports/test_safe_language.py
    note: >
      Report-language test validates Markdown dossier output does not contain
      forbidden certainty phrases: 'You can build here', 'legal access',
      'water rights', 'good investment', 'This land is safe', 'worth $'.

  evidence_lineage_checks:
    status: complete
    evidence: >
      backend/tests/reports/test_report_overclaim.py (assert source citations and NOT_EVALUATED unknowns appear in dossier prose)
    note: >
      Report-language test validates that at least one source citation appears
      in the dossier and NOT_EVALUATED domains appear as 'not determined' or
      equivalent in dossier prose.

  unknowns_visible:
    status: complete
    evidence: >
      backend/app/claims_engine/not_evaluated.py (NOT_EVALUATED_DOMAINS: parcels, assessor),
      backend/tests/private_mvp/test_mvp_regression.py (asserts NOT_EVALUATED unknowns in report)
    note: >
      Requires NOT_EVALUATED domain extension for parcels and assessor
      (ds010_011_023_selected_county_behavior). Reports must surface explicit
      NOT_EVALUATED unknowns rather than silently omitting unsupported domains.

  operator_runbook_current:
    status: complete
    evidence: >
      docs/runbooks/mvp_operator.md (Private MVP section: steps 1-6 including step 4a approval gate, known limitations table)
    note: >
      Operator runbook updated with private MVP path: DB startup, fixture-backed
      AOI intake, report creation, review/approval, Markdown dossier retrieval,
      selected-county UI launcher/browser-smoke contract, supported-AOI area-ID
      UI launcher/runtime-smoke contract, selected-county DS-010/DS-023 scope,
      DS-011 assessor sentinel status, and known limitations that separate fixture
      regression, selected-county live connector paths, DS-017, DB smoke, and
      hosted-production blockers.

hosted_production:
  # These gates are NOT required for private MVP beta.
  # They are documented here so private_mvp_beta gates cannot inadvertently
  # block on them or claim completion without them.
  _not_required_for_private_mvp: true

  hosted_deployment:
    status: blocked
    note: >
      Requires cloud infrastructure provisioning, container registry publication,
      DNS/TLS configuration, and hosted secrets. Not required for private MVP.

  oauth_oidc:
    status: blocked
    note: >
      Full user auth/RBAC, OAuth/OIDC, user accounts, and hosted identity-provider
      integration remain outside private MVP scope. Local signed-token auth is
      sufficient for private MVP.

  registry_publication:
    status: blocked
    note: >
      Requires GitHub artifact attestation entitlement (private repository).
      Local SBOM/lock provenance validates without registry publication.
      Not required for private MVP.

  billing:
    status: blocked
    note: >
      Hosted billing reconciliation, approved nonzero unit-cost thresholds,
      and paid-vendor metering remain outside private MVP scope.
      All current private MVP paths are zero-dollar compute-only.

  external_secret_manager:
    status: blocked
    note: >
      External secret manager integration, automatic key rotation, and
      hosted identity are outside private MVP scope. Local configured
      API_KEYS and REVIEWER_ACCOUNTS are sufficient for private MVP.
