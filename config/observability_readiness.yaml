schema_version: observability_readiness_v1
scope: local_release_candidate_observability
status: local_only
signals:
  - id: runtime_metrics
    label: Runtime metrics endpoint
    surface: /metrics
    schema_ref: runtime_metrics_v1
    source_files:
      - backend/app/core/metrics.py
      - backend/app/api/metrics.py
    validation:
      - backend/tests/api/test_metrics.py
      - scripts/run_deployment_smoke.ps1
  - id: queue_health
    label: Queue health endpoint
    surface: /operations/queue-health
    schema_ref: operations_queue_health_v1
    source_files:
      - backend/app/api/operations.py
    validation:
      - backend/tests/api/test_operations.py
      - scripts/run_deployment_smoke.ps1
  - id: recovery_preview
    label: Recovery preview endpoint
    surface: /operations/recovery-preview
    schema_ref: operations_recovery_preview_v1
    source_files:
      - backend/app/api/operations.py
      - backend/app/operations/recovery_preview.py
    validation:
      - backend/tests/api/test_operations.py
      - scripts/run_deployment_smoke.ps1
  - id: connector_observability
    label: Connector observability events
    surface: backend/app/connectors/observability.py
    schema_ref: connector_observability_events
    source_files:
      - backend/app/connectors/observability.py
    validation:
      - backend/tests/connectors/test_connector_observability.py
  - id: source_failure_evidence
    label: Source-failure evidence observability
    surface: connector source-failure evidence
    schema_ref: source_failure_stored
    source_files:
      - backend/app/connectors/observability.py
      - docs/connectors/connector_runbook.md
    validation:
      - backend/tests/connectors/test_connector_observability.py
      - backend/tests/connectors/test_fixture_quality.py
  - id: deployment_smoke
    label: Local deployment smoke
    surface: scripts/run_deployment_smoke.ps1
    schema_ref: deployment_smoke
    source_files:
      - scripts/run_deployment_smoke.ps1
      - scripts/run_deployment_smoke.sh
    validation:
      - backend/tests/test_deployment_smoke_scripts.py
  - id: alert_rule_catalog
    label: Repo-local alert rule catalog
    surface: config/ops_alert_rules.yaml
    schema_ref: ops_alert_rules_v1
    source_files:
      - config/ops_alert_rules.yaml
      - docs/runbooks/alerting.md
    validation:
      - scripts/run_alert_rules_check.ps1
      - backend/tests/test_alerting_artifacts.py
alert_rule_ids:
  - metrics_endpoint_down
  - report_queue_backlog_high
  - report_running_stale
  - live_connector_queue_backlog_high
  - live_connector_running_stale
hosted_blockers:
  - id: hosted_dashboard
    status: blocked
    authority: docs/runbooks/alerting.md
  - id: hosted_alert_routing
    status: blocked
    authority: config/release_readiness.yaml
  - id: pager_on_call
    status: blocked
    authority: docs/runbooks/alerting.md
  - id: hosted_log_retention
    status: blocked
    authority: config/data_retention.yaml
  - id: production_traffic_observability
    status: blocked
    authority: config/hosted_deployment.yaml
validation_commands:
  - scripts/run_observability_readiness_check.ps1
  - scripts/run_alert_rules_check.ps1
  - scripts/run_deployment_smoke.ps1
limits:
  validate_only: true
  creates_hosted_dashboard: false
  dispatches_alerts: false
  provisions_pager: false
  provisions_hosted_log_retention: false
  mutates_hosted_infrastructure: false
  writes_secrets: false
  opens_public_endpoint: false
  runs_deployment_smoke: false
