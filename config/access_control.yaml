schema_version: access_control_v1
operator_runbook: docs/runbooks/access_control.md
current_controls:
  - id: api_key_middleware
    status: implemented_default_off
    authority:
      - backend/app/api/api_key_auth.py
      - backend/app/api/secret_specs.py
      - backend/app/core/config.py
      - backend/tests/api/test_api_key_auth.py
    validation: scripts/run_access_control_check.ps1
  - id: api_key_rotation
    status: implemented_configured_static_lifecycle
    authority:
      - backend/app/core/config.py
      - backend/tests/api/test_api_key_auth.py
      - docs/runbooks/access_control.md
    validation: scripts/run_access_control_check.ps1
  - id: api_key_audit_logging
    status: implemented_structured_runtime_logs_and_db_events
    authority:
      - backend/app/api/auth_audit.py
      - backend/app/api/api_key_auth.py
      - backend/app/main.py
      - backend/tests/api/test_api_key_auth.py
      - docs/runbooks/access_control.md
    validation: scripts/run_access_control_check.ps1
  - id: ui_api_key_cookie_bridge
    status: implemented_private_beta_browser_bridge_default_local_unmounted
    authority:
      - backend/app/api/api_key_auth.py
      - backend/app/api/ui.py
      - backend/app/api/ui_auth.py
      - backend/app/api/ui_lineage.py
      - backend/app/api/ui_operations.py
      - backend/app/api/ui_review.py
      - backend/app/api/ui_shared.py
      - backend/app/core/config.py
      - backend/app/main.py
      - backend/tests/api/test_ui_api_key_auth.py
      - .env.example
      - DESIGN.md
      - docs/runbooks/access_control.md
      - docs/runbooks/mvp_operator.md
    validation: scripts/run_access_control_check.ps1
  - id: reviewer_service_account
    status: implemented_local_service_account_scoped
    authority:
      - backend/app/api/reviewer_auth.py
      - backend/app/api/secret_specs.py
      - backend/app/core/config.py
      - backend/tests/api/test_reviewer_auth.py
    validation: scripts/run_access_control_check.ps1
  - id: protected_operator_routes
    status: implemented_reviewer_authenticated_and_scoped
    authority:
      - backend/app/api/connectors.py
      - backend/app/api/operations.py
      - backend/app/api/reports.py
      - backend/tests/api/test_connector_review_actions.py
      - backend/tests/api/test_operations.py
      - backend/tests/api/test_async_report_runs.py
    validation: scripts/run_access_control_check.ps1
  - id: reviewer_scope_enforcement
    status: implemented_local_route_scopes
    authority:
      - backend/app/api/reviewer_auth.py
      - backend/app/api/connectors.py
      - backend/app/api/operations.py
      - backend/app/api/reports.py
      - backend/tests/api/test_reviewer_auth.py
      - backend/tests/api/test_connector_review_actions.py
      - backend/tests/api/test_operations.py
      - backend/tests/api/test_async_report_runs.py
      - backend/tests/api/test_fema_nfhl_connector_api.py
    validation: scripts/run_access_control_check.ps1
  - id: public_health_routes
    status: intentionally_public
    authority:
      - backend/app/api/api_key_auth.py
      - backend/tests/api/test_api_key_auth.py
    validation: scripts/run_access_control_check.ps1
implemented_controls:
  - id: security_static_analysis
    type: ci_gate
    tool: bandit
    scope: backend/app
    severity_threshold: medium+
    ci_job: security-scan
    authority:
      - scripts/run_security_scan.ps1
      - scripts/run_security_scan.sh
      - docs/runbooks/security_scan.md
    validation: scripts/run_security_scan.ps1

production_blockers:
  - id: full_user_auth_rbac
    status: blocked
    authority: docs/runbooks/mvp_operator.md
  - id: oauth_oidc_identity_provider
    status: blocked
    authority: docs/runbooks/access_control.md
  - id: user_account_persistence
    status: blocked
    authority: docs/runbooks/access_control.md
  - id: automatic_api_key_rotation
    status: blocked
    authority: docs/runbooks/access_control.md
  - id: hosted_secret_manager
    status: blocked
    authority: docs/runbooks/access_control.md
  - id: full_user_role_policy
    status: blocked
    authority: docs/runbooks/access_control.md
secret_management_contract:
  status: repo_local_handoff_contract
  authority:
    - backend/app/core/config.py
    - backend/app/api/secret_specs.py
    - .env.example
    - docker-compose.yml
    - docs/runbooks/access_control.md
  hosted_secret_manager_status: blocked
  required_runtime_refs:
    - id: API_KEY_SPECS
      required_when: REQUIRE_API_KEY=true outside local/dev/development/test APP_ENV values
      format: id|active|sha256:<64-hex> or id|retired|sha256:<64-hex>
      rotation: configured_active_retired_lifecycle
    - id: REVIEWER_ACCOUNTS
      required_when: any shared or production-like reviewer/operator workflow
      format: id:sha256:<64-hex>
      rotation: replace token hash and update REVIEWER_ACCOUNT_SCOPES for same reviewer id
    - id: REVIEWER_ACCOUNT_SCOPES
      required_when: every REVIEWER_ACCOUNTS id outside local/dev/development/test APP_ENV values
      format: id:scope|scope
      rotation: update alongside REVIEWER_ACCOUNTS and audit route-scope expectations
    - id: UI_AUTH_COOKIE_SECRET
      required_when: REQUIRE_API_KEY=true outside local/dev/development/test APP_ENV values
      format: high-entropy secret value
      rotation: rotate after draining or invalidating UI sessions
    - id: REPORT_IDENTITY_TOKEN_SECRET
      required_when: REPORT_AUTH_MODE=signed_token
      format: high-entropy secret value with at least 32 characters
      rotation: rotate with token issuer and short-lived token expiry window
    - id: DATABASE_URL
      required_when: USE_DB_SERVICES=true or any non-local APP_ENV value
      format: database connection URL from hosted secret manager or platform binding
      rotation: rotate database credentials with connection drain and DB smoke proof
  handoff_requirements:
    - external_secret_manager_reference_names
    - per_environment_secret_owner
    - rotation_runbook_or_ticket
    - post_rotation_access_control_check
    - no_plaintext_committed_secret_values
  limits:
    validate_only_catalog: true
    writes_secrets: false
    provisions_hosted_secret_manager: false
    permits_committed_plaintext_secrets: false
identity_rbac_contract:
  status: repo_local_design_contract
  authority:
    - backend/app/api/dependencies.py
    - backend/app/api/report_auth.py
    - backend/app/api/reviewer_auth.py
    - backend/app/api/auth_audit.py
    - docs/runbooks/access_control.md
    - docs/runbooks/mvp_operator.md
  hosted_identity_provider_status: blocked
  user_account_persistence_status: blocked
  full_role_policy_status: blocked
  required_identity_claims:
    - subject
    - email
    - display_name
    - workspace_id
    - user_id
    - groups_or_roles
  role_mappings:
    platform_admin:
      scopes:
        - connector:run
        - connector:review
        - operations:read
        - report:approve
        - report:retry
        - report:run
        - source:manage
    workspace_admin:
      scopes:
        - operations:read
        - report:approve
        - report:retry
        - report:run
    reviewer:
      scopes:
        - connector:review
        - report:approve
    operator:
      scopes:
        - connector:run
        - operations:read
        - report:run
    read_only:
      scopes:
        - operations:read
  route_scope_mappings:
    - id: fixture_connector_runs
      route_scope: connector:run
      route_module: backend/app/api/connectors.py
      route_functions:
        - run_fixture_connector
      route_patterns:
        - POST /connector-runs
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_connector_ingest_api.py::test_run_connector_requires_reviewer_credentials
        - backend/tests/api/test_connector_ingest_api.py::test_run_connector_rejects_reviewer_without_connector_run_scope
    - id: live_connector_runs
      route_scope: connector:run
      route_module: backend/app/api/connectors.py
      route_functions:
        - query_fema_nfhl_bbox
        - query_usgs_tnm_bbox
        - query_ssurgo_bbox
        - query_nwi_bbox
        - query_osm_road_access_bbox
        - query_usgs_water_monitoring_bbox
        - query_epa_echo_bbox
        - query_fcc_broadband_bbox
        - query_blm_mlrs_bbox
        - query_usgs_mrds_bbox
        - query_nc_geologic_map_bbox
        - query_noaa_climate_bbox
        - query_census_tiger_bbox
        - query_chatham_parcels_bbox
        - query_buncombe_parcels_bbox
        - query_brunswick_parcels_bbox
        - query_chatham_zoning_district
        - query_brunswick_zoning_district
        - query_assessor_not_evaluated
        - schedule_live_connector_sequence_bbox
        - schedule_fema_nfhl_bbox
        - schedule_usgs_tnm_bbox
        - schedule_nwi_bbox
        - schedule_ssurgo_bbox
      route_patterns:
        - POST /connector-runs/{source}/query-*
        - POST /connector-runs/{source}/schedule-bbox
        - POST /connector-runs/live-sequence/schedule-bbox
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_usgs_tnm_connector_api.py::test_usgs_tnm_query_bbox_requires_reviewer_auth
        - backend/tests/api/test_fema_nfhl_connector_api.py::test_fema_nfhl_schedule_bbox_rejects_reviewer_without_connector_run_scope
    - id: connector_review_decisions
      route_scope: connector:review
      route_module: backend/app/api/connectors.py
      route_functions:
        - approve_connector_review_queue_item_compat
        - reject_connector_review_queue_item_compat
        - requeue_connector_review_queue_item_compat
        - cancel_connector_review_queue_item_compat
        - approve_for_connector_qa
        - request_fixture_fix
        - requeue_after_fix
        - cancel_review
      route_patterns:
        - POST /connector-review-queue/{ingest_run_id}/{action}
        - POST /connector-runs/{ingest_run_id}/review-actions/{action}
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_connector_review_queue_api.py::test_connector_review_action_requires_reviewer_credentials
        - backend/tests/api/test_connector_review_queue_api.py::test_connector_review_action_rejects_reviewer_without_review_scope
    - id: operations_api_reads
      route_scope: operations:read
      route_module: backend/app/api/operations.py
      route_functions:
        - queue_health
        - recovery_preview
      route_patterns:
        - GET /operations/queue-health
        - GET /operations/recovery-preview
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_operations.py::test_queue_health_rejects_reviewer_without_operations_read_scope
        - backend/tests/api/test_operations.py::test_recovery_preview_rejects_reviewer_without_operations_read_scope
    - id: live_connector_job_reads
      route_scope: operations:read
      route_module: backend/app/api/connectors.py
      route_functions:
        - list_live_connector_jobs
        - get_live_connector_job
      route_patterns:
        - GET /connector-runs/live-jobs
        - GET /connector-runs/live-jobs/{job_id}
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_usgs_tnm_connector_api.py::test_live_connector_job_inspection_requires_operations_read_scope
    - id: report_approval
      route_scope: report:approve
      route_module: backend/app/api/reports.py
      route_functions:
        - approve_report_run
      route_patterns:
        - POST /report-runs/{report_run_id}/approve
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_approved_path_http.py::test_http_approve_requires_credential
    - id: report_retry
      route_scope: report:retry
      route_module: backend/app/api/reports.py
      route_functions:
        - retry_report_run
      route_patterns:
        - POST /report-runs/{report_run_id}/retry
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_async_report_runs.py::test_retry_report_run_rejects_reviewer_without_retry_scope
    - id: selected_county_report_runs
      route_scope: report:run
      route_module: backend/app/api/operator_cases.py
      route_functions:
        - create_operator_case_report
      route_patterns:
        - POST /operator-cases/{case_id}/report
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_operator_cases_api.py::test_operator_case_report_create_rejects_reviewer_without_report_run_scope
    - id: approved_connector_report_runs
      route_scope: report:run
      route_module: backend/app/api/connectors.py
      route_functions:
        - create_report_run_from_approved_connector
      route_patterns:
        - POST /connector-runs/{ingest_run_id}/report-runs
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_connector_review_actions.py::test_connector_report_run_rejects_reviewer_without_report_run_scope
    - id: source_registry_mutation
      route_scope: source:manage
      route_module: backend/app/api/sources.py
      route_functions:
        - create_source
      route_patterns:
        - POST /sources
      enforcement: api_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_api_scaffold.py::test_api_scaffold_source_create_requires_source_manage_scope
    - id: ui_selected_county_report_runs
      route_scope: report:run
      route_module: backend/app/api/ui.py
      route_functions:
