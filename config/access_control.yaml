      route_patterns:
        - POST /ui/operator-cases/report
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_routes.py::test_ui_selected_county_fixture_post_requires_report_run_reviewer
    - id: ui_report_approval
      route_scope: report:approve
      route_module: backend/app/api/ui.py
      route_functions:
        - ui_approve_report_run
      route_patterns:
        - POST /ui/report-runs/{report_run_id}/approve
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_routes.py::test_ui_approve_report_run_valid_creds_without_approve_scope_returns_403
    - id: ui_report_retry
      route_scope: report:retry
      route_module: backend/app/api/ui.py
      route_functions:
        - ui_retry_report_run
      route_patterns:
        - POST /ui/report-runs/{report_run_id}/retry
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_routes.py::test_ui_retry_report_run_valid_creds_without_retry_scope_returns_403
    - id: ui_connector_review_decisions
      route_scope: connector:review
      route_module: backend/app/api/ui_review.py
      route_functions:
        - ui_connector_approve
        - ui_connector_reject
        - ui_connector_requeue
        - ui_connector_cancel
      route_patterns:
        - POST /ui/connector-review-queue/{ingest_run_id}/{action}
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_review_routes.py::test_ui_review_approve_valid_unscoped_returns_403
    - id: ui_connector_resume_report
      route_scope: report:run
      route_module: backend/app/api/ui_review.py
      route_functions:
        - ui_connector_resume_report
      route_patterns:
        - POST /ui/connector-review-queue/{ingest_run_id}/resume-report
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_review_routes.py::test_ui_review_resume_report_valid_token_missing_report_run_scope_returns_403
    - id: ui_operations_reads
      route_scope: operations:read
      route_module: backend/app/api/ui_operations.py
      route_functions:
        - ui_operations_post
        - ui_operations_recovery_preview_post
      route_patterns:
        - POST /ui/operations
        - POST /ui/operations/recovery-preview
      enforcement: ui_reviewer_scope
      covered_by_tests:
        - backend/tests/api/test_ui_operations_routes.py::test_ui_operations_post_valid_creds_without_operations_scope_returns_403
  identity_boundary_mappings:
    - id: connector_review_read_surfaces
      identity_boundary: workspace_identity
      route_module: backend/app/api/connectors.py
      route_functions:
        - list_connector_review_queue_compat
        - get_connector_review_queue_item_compat
        - get_connector_run_review_status
        - get_connector_review_queue_item
      route_patterns:
        - GET /connector-review-queue
        - GET /connector-review-queue/{ingest_run_id}
        - GET /connector-runs/{ingest_run_id}/review-status
        - GET /connector-runs/{ingest_run_id}/review-queue
      enforcement: workspace_identity_only
      scope_note: "No reviewer route scope is currently enforced; workspace identity must hide cross-workspace rows."
      covered_by_tests:
        - backend/tests/api/test_connector_review_status.py::test_connector_review_status_endpoint_requires_identity
        - backend/tests/api/test_connector_review_status.py::test_connector_review_status_endpoint_hides_other_workspace
        - backend/tests/api/test_connector_review_status.py::test_connector_review_queue_endpoint_requires_identity
        - backend/tests/api/test_connector_review_status.py::test_connector_review_queue_endpoint_hides_other_workspace
  audit_requirements:
    - idp_subject
    - workspace_id
    - user_id
    - role_ids
    - route_scope
    - session_or_token_id
    - decision_outcome
  migration_requirements:
    - map_current_reviewer_scopes_to_roles
    - bind_report_identity_tokens_to_user_account
    - preserve_static_service_account_breakglass
    - record_user_bound_audit_events
  limits:
    validate_only_catalog: true
    provisions_identity_provider: false
    creates_user_account_tables: false
    implements_oauth_oidc: false
    claims_production_rbac: false
