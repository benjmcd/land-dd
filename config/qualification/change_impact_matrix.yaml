schema_version: qualification_change_impact_v3
default_rule: If impact is uncertain, invalidate every plausibly affected gate until reviewed.
change_classes:
  DOCS_NONSEMANTIC:
    review:
    - M
    - G
    invalidate_by_default: []
    path_globs: []
    examples:
    - typo
    - link correction
    - formatting with no semantic change
  SOURCE_DATA_REFRESH:
    review:
    - DQ
    - Q1
    - F
    invalidate_by_default:
    - Q1-003
    - Q1-011
    - DQ-005
    - DQ-018
    path_globs:
    - data/**
    - fixtures/**
    - local_artifacts/source-data/**
    - config/source_*.yaml
    - config/bologna_*source*.yaml
    conditional:
    - S
    - R
    - G if rights/freshness/coverage changed
  SOURCE_SCHEMA_OR_CONNECTOR:
    review:
    - DQ
    - Q1
    - Q3A
    - Q3B
    - M
    - F
    invalidate_by_default:
    - Q1-003
    - Q1-027
    - Q3-006
    - Q3-009
    - DQ-009
    - DQ-017
    path_globs:
    - backend/app/connectors/**
    - backend/app/api/connectors.py
    - backend/app/api/live_connectors.py
    - backend/tests/connectors/**
    - backend/app/source_registry/**
    - backend/tests/source_registry/**
    - scripts/source_*.py
    - scripts/*source*_check.py
    - schemas/*source*.json
    - config/source_*.yaml
  SOURCE_RIGHTS_OR_TERMS:
    review:
    - S
    - R
    - G
    - Q1
    - Q3B
    - F
    invalidate_by_default:
    - Q1-012
    - Q1-025
    - Q3-007
    - Q3-029
    - S-016
    - R-005
    path_globs:
    - config/source_entitlements.yaml
    - config/bologna_source_rights.yaml
    - config/bologna_source_authority_intake.yaml
    - docs/source-reviews/**
    - docs/runbooks/*source*.md
  AOI_IDENTITY_OR_GEOMETRY:
    review:
    - IR
    - DQ
    - Q1
    - DB
    - F
    invalidate_by_default:
    - Q1-013
    - Q1-014
    - Q1-031
    - IR-001
    - IR-012
    - DB-006
    path_globs:
    - backend/app/area_geometry/**
    - backend/tests/area_geometry/**
    - backend/app/areas/**
    - backend/app/geometry/**
    - backend/app/spatial/**
    - config/spatial_query_plan.yaml
    - scripts/spatial_query_plan*.py
    - backend/tests/**/test_*spatial*.py
  RULE_OR_CONFIDENCE_SEMANTICS:
    review:
    - Q1
    - Q2
    - M
    - G
    - F
    invalidate_by_default:
    - Q1-002
    - Q1-016
    - Q1-017
    - Q1-022
    - Q2-011
    path_globs:
    - backend/app/claims_engine/**
    - backend/app/domain/claim_contracts.py
    - backend/tests/claims_engine/**
    - backend/app/claims/**
    - backend/app/rules/**
    - backend/app/reports/**
    - schemas/claim_schema.json
    - config/ruleset_*.yaml
    - config/qualification/criterion_catalog.yaml
    - config/qualification/judgment_rubrics.yaml
  REPORT_OR_CAVEAT_SEMANTICS:
    review:
    - Q1
    - Q2
    - A
    - R
    - G
    invalidate_by_default:
    - Q1-004
    - Q1-018
    - Q1-025
    - Q2-019
    - A-006
    - R-007
    - G-011
    path_globs:
    - backend/app/evidence_ledger/**
    - backend/tests/evidence_ledger/**
    - backend/app/reports/**
    - backend/tests/**/test_*report*.py
    - schemas/evidence_schema.json
    - scripts/generate_dossier.py
    - api/openapi_stub.yaml
    - docs/runbooks/release_readiness.md
  UI_WORKFLOW:
    review:
    - Q2
    - A
    - S
    - O
    invalidate_by_default:
    - Q2-005
    - Q2-016
    - Q2-018
    - A-001
    - A-003
    - A-007
    path_globs:
    - backend/app/api/ui*.py
    - backend/tests/api/test_ui_*.py
    - scripts/ui_*.py
    - scripts/ui_*.mjs
  DB_SCHEMA_OR_MIGRATION:
    review:
    - DB
    - M
    - O
    - G
    invalidate_by_default:
    - DB-002
    - DB-003
    - DB-004
    - DB-014
    - Q1-021
    - Q3-030
    path_globs:
    - backend/app/db/**
    - backend/alembic/**
    - backend/migrations/**
    - scripts/db_*.py
    - scripts/db_*.ps1
    - scripts/db_*.sh
    - docker-compose.yml
  AUTH_TENANCY_PRIVACY:
    review:
    - S
    - DB
    - O
    - R
    invalidate_by_default:
    - S-003
    - S-004
    - S-011
    - S-012
    - DB-010
    - O-002
    path_globs:
    - backend/app/api/*auth*.py
    - backend/app/security*.py
    - backend/tests/api/test_*auth*.py
    - config/access_control.yaml
    - scripts/access_control_check.py
  DEPLOYMENT_INFRASTRUCTURE:
    review:
    - O
    - S
    - DB
    - M
    invalidate_by_default:
    - O-001
    - O-002
    - O-003
    - O-019
    - S-013
    - DB-012
    path_globs:
    - .github/workflows/**
    - backend/Dockerfile
    - docker-compose.yml
    - config/*deployment*.yaml
    - config/release_readiness.yaml
    - scripts/*deployment*.py
    - scripts/release_*_check.py
    - scripts/package_manifest_check.py
    - scripts/verify.sh
    - scripts/verify.ps1
  AI_MODEL_PROMPT_PROVIDER:
    review:
    - AI
    - Q1
    - Q2
    - S
    - E
    - F
    invalidate_by_default:
    - AI-002
    - AI-004
    - AI-006
    - AI-009
    - Q1-004
    - Q2-014
    path_globs:
    - prompts/**
    - config/ai*.yaml
    - backend/app/**/ai*.py
    - backend/app/**/*prompt*.py
    - backend/tests/**/*prompt*.py
  NEW_INTENT_OR_DOMAIN:
    review:
    - P0
    - Q1
    - Q2
    - DQ
    - IR
    - R
    invalidate_by_default:
    - P0-001
    - P0-006
    - P0-007
    - Q1-037
    - Q2-027
    - DQ-019
    path_globs:
    - config/qualification/qualification_targets.yaml
    - config/qualification/qualification_profiles.yaml
    - config/qualification/domain_profiles/**
    - docs/qualification/**
  NEW_US_JURISDICTION:
    review:
    - Q3A
    - DQ
    - IR
    - R
    invalidate_by_default:
    - Q3-011
    - Q3-013
    - Q3-015
    - R-001
    - R-009
    - DQ-013
    path_globs:
    - config/checklist_dry_run.yaml
    - backend/app/**/jurisdiction*.py
    - backend/tests/**/*jurisdiction*.py
    - docs/runbooks/*jurisdiction*.md
  NEW_NON_US_JURISDICTION:
    review:
    - Q3C
    - DQ
    - IR
    - R
    - S
    invalidate_by_default:
    - Q3-012
    - Q3-028
    - R-006
    - R-009
    - S-025
    - DQ-013
    path_globs:
    - config/bologna_*.yaml
    - docs/runbooks/bologna_*.md
    - docs/source-reviews/bologna-*.md
    - scripts/bologna_*_check.py
    - scripts/bologna_owner_answer_evaluator.py
    - scripts/bol_scope_auth_check.py
    - backend/tests/**/*bologna*.py
  CANDIDATE_SEARCH_OR_RANKING:
    review:
    - CG
    - Q1
    - Q2
    - IR
    - DQ
    - S
    - F
    - G
    invalidate_by_default:
    - CG-001
    - CG-004
    - CG-010
    - CG-012
    - Q2-017
    - S-015
    path_globs:
    - backend/app/**/*candidate*.py
    - backend/app/**/*ranking*.py
    - backend/tests/**/*candidate*.py
    - backend/tests/**/*ranking*.py
    - config/qualification/qualification_profiles.yaml
  FINANCIAL_MODEL_OR_MARKET_DATA:
    review:
    - FIN
    - Q1
    - Q2
    - DQ
    - S
    - R
    - E
    - F
    - G
    invalidate_by_default:
    - FIN-001
    - FIN-002
    - FIN-004
    - FIN-012
    - R-004
    - Q1-004
    path_globs:
    - backend/app/**/*financial*.py
    - backend/app/**/*valuation*.py
    - backend/tests/**/*financial*.py
    - backend/tests/**/*valuation*.py
    - config/*market*.yaml
  WINDOWS_TOOLING_OR_LOCAL_RUNTIME:
    review:
    - W
    - M
    - DB
    - G
    invalidate_by_default:
    - W-001
    - W-002
    - W-003
    - W-007
    - M-012
    path_globs:
    - scripts/*.ps1
    - scripts/*.cmd
    - .env.example
    - Makefile
  DOCUMENT_EXTRACTION_OR_OCR:
    review:
    - DQ
    - Q1
    - M
    - S
    - R
    - AI
    invalidate_by_default:
    - DQ-021
    - DQ-022
    - Q1-002
    - Q1-003
    - AI-009
    - S-008
    path_globs:
    - backend/app/**/*ocr*.py
    - backend/app/**/*document*.py
    - backend/tests/**/*ocr*.py
    - backend/tests/**/*document*.py
    - scripts/*ocr*.py
    - scripts/*document*.py
  DOMAIN_REFERENCE_OR_RUBRIC:
    review:
    - P0
    - Q1
    - Q2
    - DQ
    - R
    - G
    invalidate_by_default:
    - P0-029
    - Q1-017
    - Q1-037
    - Q2-013
    - DQ-012
    - G-008
    path_globs:
    - config/qualification/criterion_catalog.yaml
    - config/qualification/change_impact_matrix.yaml
    - config/qualification/judgment_rubrics.yaml
    - config/qualification/domain_profiles/**
    - schemas/qualification/**
    - scripts/qualification_*.py
    - scripts/qualification_*.ps1
    - scripts/run_qualification*.sh
    - scripts/validate_qualification.py
    - scripts/selftest_qualification_validator.py
    - backend/tests/test_qualification*.py
    - docs/qualification/**
