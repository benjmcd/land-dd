schema_version: qualification_readiness_crosswalk_v1
purpose: Maps active readiness, authority, release, source, security, operations, and spatial gate surfaces to empirical qualification criterion IDs without claiming those criteria pass.
inventory:
  config_globs:
  - config/*readiness*.yaml
  - config/*authority*.yaml
  - config/*entitlement*.yaml
  - config/bologna_*.yaml
  - config/access_control.yaml
  - config/checklist_dry_run.yaml
  - config/data_retention.yaml
  - config/hosted_deployment.yaml
  - config/image_publication.yaml
  - config/ops_alert_rules.yaml
  - config/ops_cost_monitoring.yaml
  - config/performance_baseline.yaml
  - config/release_package.yaml
  - config/spatial_query_plan.yaml
  - config/threat_proxy_audit.yaml
  checker_globs:
  - scripts/*readiness*_check.py
  - scripts/*authority*_check.py
  - scripts/*entitlement*_check.py
  - scripts/bologna_*_check.py
  - scripts/access_control_check.py
  - scripts/alert_rules_check.py
  - scripts/checklist_dry_run_check.py
  - scripts/container_scan_check.py
  - scripts/cost_monitoring_check.py
  - scripts/data_retention_check.py
  - scripts/hosted_deployment_check.py
  - scripts/image_publication_check.py
  - scripts/incident_rollback_check.py
