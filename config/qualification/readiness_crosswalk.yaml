gap_groups:
- gap_id: empirical_acceptance_cases
  criterion_ids:
  - Q1-006
  - Q1-007
  - Q1-008
  - Q1-009
  - Q2-001
  - Q2-005
  reason: Existing readiness gates do not provide sealed empirical acceptance cases or user outcome evidence.
- gap_id: live_field_surveillance
  criterion_ids:
  - F-001
  - F-003
  - F-012
  reason: Readiness configs describe intended monitoring posture but do not create production field surveillance evidence.
- gap_id: disabled_decision_capabilities
  criterion_ids:
  - AI-001
  - CG-001
  - FIN-001
  reason: AI, candidate generation, and financial modeling remain disabled overlays and have no pass-capable readiness surface.
- gap_id: hosted_runtime_evidence
  criterion_ids:
  - O-007
  - O-013
  - O-018
  reason: Hosted-operation criteria need runtime evidence that static readiness configs cannot provide.
