schema_version: bologna_source_rights_v1
operator_runbook: docs/runbooks/bologna_source_rights.md
source_review: docs/source-reviews/bologna-source-rights.md
candidate_catalog: config/bologna_source_candidates.yaml
status: repo_local_validate_only
