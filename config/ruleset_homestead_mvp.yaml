ruleset:
  id: homestead_mvp_v0_1
  name: Homestead feasibility MVP ruleset
  intent: homestead_feasibility
  status: draft
  version: 0.1
  applies_to:
    country: US
    geography_scope: target_mvp_counties
  principles:
    - hard_gates_before_scores
    - confidence_separate_from_suitability
    - source_failures_are_unknowns
    - road_proximity_does_not_equal_legal_access
    - wetland_maps_are_screening_not_delineation
  hard_gates:
    - code: ACCESS_G001
      domain: access
      severity_on_fail: critical
      condition: no_public_road_adjacency_or_access_source_unavailable
      claim_code: ACCESS_001
      verification_task: Confirm recorded legal access/easements through title review and county records.
    - code: ZONING_G001
      domain: zoning
      severity_on_fail: critical
      condition: intended_residential_use_prohibited_or_unknown
      claim_code: ZONING_001
      verification_task: Call county planning and verify permitted uses, overlays, and minimum lot size.
    - code: FLOOD_G001
      domain: flood
      severity_on_fail: high
      condition: material_intersection_with_high_risk_flood_zone
      claim_code: FLOOD_001
      verification_task: Confirm flood zone and insurance/building implications with local floodplain administrator.
    - code: WETLAND_G001
      domain: wetlands
      severity_on_fail: high
      condition: material_intersection_with_mapped_wetlands
      claim_code: WETLAND_001
      verification_task: Order professional wetland delineation before site planning.
    - code: SLOPE_G001
      domain: buildability
      severity_on_fail: high
      condition: insufficient_low_slope_buildable_area
      claim_code: SLOPE_001
      verification_task: Confirm buildable envelope with surveyor/engineer.
    - code: WATER_G001
      domain: water
      severity_on_fail: high
      condition: no_plausible_water_context_or_source_unavailable
      claim_code: WATER_001
      verification_task: Check well logs, water rights, hauling rules, and local well contractors.
    - code: SOIL_G001
      domain: soil_septic
      severity_on_fail: unknown
      condition: soil_septic_unsupported
      claim_code: SOIL_NOT_EVALUATED
      verification_task: Verify soil and septic feasibility with perc testing, county health department records, and a septic engineer.
    - code: SOIL_G002
      domain: soil_septic
      severity_on_fail: low
      condition: soil_poor_or_hydric_drainage_detected
      claim_code: SOIL_POOR_DRAINAGE_001
      verification_task: Poorly drained or hydric soils detected in USDA NRCS SSURGO screening. Conduct perc testing, consult county health department, and evaluate with a licensed septic engineer before planning on-site wastewater.
    - code: ENV_G001
      domain: env_hazard
      severity_on_fail: high
      condition: env_hazard_facility_proximity
      claim_code: ENV_001
      verification_task: Review EPA ECHO facility records, state environmental agency, and conduct Phase I ESA before relying on this screening.
    - code: RESOURCE_G001
      domain: resource_context
      severity_on_fail: unknown
      condition: resource_context_unsupported
      claim_code: RESOURCE_NOT_EVALUATED
      verification_task: Verify mineral, timber, water-rights, and other resource-context records through title and appropriate state or local sources.
    - code: MARKET_G001
      domain: market_context
      severity_on_fail: unknown
      condition: market_context_out_of_scope
      claim_code: MARKET_OUT_OF_SCOPE
      verification_task: Use qualified local professionals for sales-comparison, appraisal, buyer-suitability, or financial-return questions.
    - code: PARCEL_G001
      domain: parcels
      severity_on_fail: unknown
      condition: parcels_not_evaluated
      claim_code: PARCEL_NOT_EVALUATED
      verification_task: Confirm parcel boundaries and cadastral data with the county Register of Deeds and a licensed surveyor. Mapped parcel boundaries are not survey-grade.
    - code: PARCEL_SCREEN_G001
      domain: parcels
      severity_on_fail: unknown
      condition: county_parcel_screen_identified
      claim_code: PARCEL_SCREEN_001
      verification_task: Verify parcel boundaries, acreage, and zoning with the county Register of Deeds, county GIS, and a licensed surveyor. Parcel boundaries from county GIS are approximate and not survey-grade.
    - code: ASSESSOR_G001
      domain: assessor
      severity_on_fail: unknown
      condition: assessor_not_evaluated
      claim_code: ASSESSOR_NOT_EVALUATED
      verification_task: Confirm assessed value, tax year, and ownership information with the county Tax Administration office. Assessed value is not market value.
    - code: BROADBAND_G001
      domain: broadband
      severity_on_fail: low
      condition: no_broadband_service_detected
      claim_code: BROADBAND_NO_ACCESS_001
      verification_task: Verify broadband availability directly with local internet service providers; FCC data may lag actual availability, especially for fixed wireless and newer fiber deployments.
    - code: BROADBAND_G002
      domain: broadband
      severity_on_fail: unknown
      condition: broadband_source_unavailable
      claim_code: BROADBAND_SOURCE_UNAVAILABLE
      verification_task: FCC broadband availability data could not be retrieved. Verify internet connectivity options with local ISPs before relying on this area for remote work or farm operations.
    - code: MINERALS_G001
      domain: minerals
      severity_on_fail: low
      condition: blm_active_mining_claims_present
      claim_code: MINERALS_ACTIVE_CLAIMS_001
      verification_task: Verify mineral rights status through title search; active federal mining claims may affect surface use, access, and development. Consult a title attorney.
    - code: MINERALS_G002
      domain: minerals
      severity_on_fail: unknown
      condition: minerals_source_unavailable
      claim_code: MINERALS_SOURCE_UNAVAILABLE
      verification_task: BLM MLRS and/or USGS MRDS mining/mineral data could not be retrieved. Verify through title search and appropriate state or federal mineral records.
  scoring:
    output: bands_not_raw_score
    weights:
      buildability: 0.20
      access: 0.20
      water: 0.15
      zoning_legal: 0.15
      flood_wetlands: 0.10
      soil_septic: 0.10
      environmental_hazards: 0.05
      market_context: 0.05
  confidence:
    downgrade_if:
      - source_unavailable
      - source_stale
      - conflicting_sources
      - proxy_only
      - low_spatial_precision
      - legal_right_not_verified
  forbidden_language:
    - You can build here.
    - This parcel has legal access.
    - This land has water rights.
    - This property is safe.
    - This property is worth
    - No environmental problems exist.
