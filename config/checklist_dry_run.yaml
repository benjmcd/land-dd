        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Assess zoning source shape for the selected candidate only.
      - item_id: zoning_source_license_reviewed
        status: blocked_external_authority
        evidence: [docs/source-reviews/ds-023.md, schemas/source_schema.json]
        blocker_authority:
          - docs/checklists/jurisdiction_readiness.md
          - docs/source-reviews/ds-023.md
          - schemas/source_schema.json
        next_action: Complete zoning source license review before any candidate zoning data is used.
      - item_id: water_rights_regime_prior_appropriation_riparian_documented
