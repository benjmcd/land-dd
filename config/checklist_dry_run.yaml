schema_version: checklist_dry_run_v1
operator_runbook: docs/runbooks/checklist_dry_run.md
status: repo_local_validate_only
validation: scripts/run_checklist_dry_run_check.ps1

candidate_shape:
  id: hypothetical_next_county_existing_homestead_mvp
  status: hypothetical_not_selected
  description: >
    A future, unselected county-like jurisdiction for the existing rural land /
    homestead MVP intent. This shape exists only to exercise the readiness checklists;
    it is not a geography, source, connector, rulepack, or release approval.
  authority:
    - README.md
    - state/POST_RC_AUTHORITY_SPLIT.md
    - state/LEVEL_9_10_GATE_MATRIX.md
    - state/PROJECT_STATE.md
  approvals:
    new_geography_selected: false
    new_rulepack_approved: false
    new_source_approved: false
    ds017_unblocked: false
    hosted_production_ready: false

limits:
  validate_only_catalog: true
  selects_new_geography: false
  approves_new_rulepack: false
  approves_new_source: false
  unblocks_ds017: false
  runs_live_connectors: false
  creates_runtime_artifacts: false
  claims_legal_review: false
  claims_hosted_production_ready: false

checklists:
  - id: jurisdiction_readiness
    source: docs/checklists/jurisdiction_readiness.md
    scope: intentionally_scoped_pre_expansion_gate
    dry_run:
      - item_id: county_township_boundary_source_identified_and_registered_in_data_source_registry_csv
        status: missing_candidate_decision
        evidence: [registers/data_source_registry.csv, docs/DATA_SOURCE_STRATEGY.md]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Select a candidate jurisdiction before registering its boundary source.
      - item_id: administrative_hierarchy_state_county_township_modeled_in_area_geometry
        status: missing_candidate_decision
        evidence: [docs/ARCHITECTURE.md, docs/POSTGRES_FIRST_STORAGE.md]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Model the selected jurisdiction hierarchy after a candidate is authorized.
      - item_id: boundary_source_license_reviewed_and_recorded
        status: blocked_external_authority
        evidence: [registers/data_source_registry.csv, schemas/source_schema.json]
        blocker_authority:
          - docs/checklists/jurisdiction_readiness.md
          - registers/data_source_registry.csv
          - schemas/source_schema.json
        next_action: Complete source/license review for the candidate boundary source.
      - item_id: parcel_cadastre_availability_assessed_for_this_jurisdiction
        status: missing_candidate_decision
        evidence: [docs/source-reviews/ds-010.md, scripts/source_readiness.py]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Assess parcel availability only after the candidate jurisdiction is named.
      - item_id: if_available_parcel_source_license_reviewed_connector_added_to_scope
        status: missing_candidate_decision
        evidence: [docs/source-reviews/ds-010.md, backend/app/source_registry/connector_inventory.py]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Add parcel connector scope only after source review approves that jurisdiction's parcel source.
      - item_id: if_unavailable_unknown_parcel_claim_added_to_rulepack
        status: missing_candidate_decision
        evidence: [config/ruleset_homestead_mvp.yaml, backend/tests/claims_engine/test_not_evaluated_claims.py]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
        next_action: Add candidate-specific UNKNOWN behavior if parcel data is unavailable.
      - item_id: county_municipal_zoning_authority_identified
        status: missing_candidate_decision
        evidence: [docs/source-reviews/ds-023.md, docs/checklists/jurisdiction_readiness.md]
        blocker_authority: [docs/checklists/jurisdiction_readiness.md]
