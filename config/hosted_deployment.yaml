schema_version: hosted_deployment_v1
deployment:
  service_name: land-diligence-api
  runtime: containerized-fastapi
  image_publication_catalog: config/image_publication.yaml
  release_readiness_catalog: config/release_readiness.yaml
required_pre_deploy_gates:
  - scripts/verify.ps1
  - scripts/run_deployment_smoke.ps1
  - scripts/run_release_readiness_check.ps1
  - scripts/run_image_publication_check.ps1
required_runtime_inputs:
  - REGISTRY_IMAGE
  - IMAGE_DIGEST
  - PUBLIC_BASE_URL
  - DATABASE_URL
  - API_KEYS
  - API_KEY_SPECS
  - REVIEWER_ACCOUNTS
  - REVIEWER_ACCOUNT_SCOPES
required_runtime_evidence:
  - immutable_image_digest
  - deployed_image_ref
  - platform_environment_name
  - database_instance_name
  - public_https_url
  - tls_certificate_status
  - health_endpoint_ok
  - version_endpoint_ok
  - metrics_endpoint_ok
  - queue_health_endpoint_ok
  - report_workflow_smoke_ok
  - rollback_target
  - backup_restore_proof
blocked_until:
  - hosted_platform_selected
  - domain_tls_authority
  - secrets_manager_authority
  - database_instance_authority
  - registry_image_digest_available
  - hosted_billing_reconciliation
  - hosted_alerting_route
limits:
  validate_only: true
  creates_hosted_deployment: false
  mutates_hosted_infrastructure: false
  writes_secrets: false
  opens_public_endpoint: false
