schema_version: release_readiness_v1
operator_runbook: docs/runbooks/release_readiness.md
required_checks:
  - id: workspace_verify
    proof: scripts/verify.ps1
    ci_job: verify
  - id: db_verify
    proof: scripts/verify.ps1
    ci_job: db-verify
  - id: deployment_smoke
    proof: scripts/run_deployment_smoke.ps1
    ci_job: null
  - id: dependency_provenance
    proof: scripts/run_provenance_check.ps1
    ci_job: dependency-attestations
  - id: supply_chain_scan
    proof: scripts/run_supply_chain_check.ps1
    ci_job: supply-chain
  - id: container_image_scan
    proof: scripts/run_container_scan_check.ps1
    ci_job: container-image-scan
  - id: backup_restore
    proof: scripts/run_backup_restore_check.ps1
    ci_job: null
  - id: incident_rollback
    proof: scripts/run_incident_rollback_check.ps1
    ci_job: null
  - id: alert_rules
    proof: scripts/run_alert_rules_check.ps1
    ci_job: null
  - id: cost_monitoring
    proof: scripts/run_cost_monitoring_check.ps1
    ci_job: null
  - id: access_control
    proof: scripts/run_access_control_check.ps1
    ci_job: access-control
  - id: release_package
    proof: scripts/run_release_package_check.ps1
    ci_job: null
  - id: source_readiness
    proof: scripts/source_readiness.py
    ci_job: null
  - id: security_scan
    proof: scripts/run_security_scan.ps1
    ci_job: security-scan
  - id: data_retention
    proof: scripts/run_data_retention_check.ps1
    ci_job: null
  - id: jurisdiction_readiness
    proof: docs/checklists/jurisdiction_readiness.md
    ci_job: null
  - id: rulepack_readiness
    proof: docs/checklists/rulepack_readiness.md
    ci_job: null
  - id: load_test
    proof: scripts/run_load_test.ps1
    ci_job: null
  - id: performance
    proof: docs/runbooks/performance.md
    ci_job: null
  - id: data_lineage
    proof: backend/app/api/reports.py
    ci_job: null
release_blockers:
  - id: non_ready_must_sources
    status: blocked
    authority: scripts/source_readiness.py
local_only_deferred:
  - id: billing_hosted_billing_reconciliation
    status: out_of_scope_local_only
    authority: docs/runbooks/cost_monitoring.md
    reason: No billing feature, hosted spend reconciliation, or customer payment path is planned for local PC operation.
  - id: hosted_deployment
    status: out_of_scope_local_only
    authority: docs/runbooks/hosted_deployment.md
    reason: Cloud or online hosting is not part of the local-only production-grade target.
  - id: hosted_deployment_attestation
    status: out_of_scope_local_only
    authority: docs/runbooks/hosted_deployment.md
    reason: Deployment attestation only applies to hosted/cloud runtime distribution.
  - id: hosted_alerting
    status: out_of_scope_local_only
    authority: docs/runbooks/alerting.md
    reason: Hosted alert manager, pager, dashboard, and routing are not required for local PC operation.
  - id: hosted_log_retention
    status: out_of_scope_local_only
    authority: docs/runbooks/data_retention.md
    reason: Hosted log retention or SIEM export is not required for local PC operation.
  - id: published_registry_image_attestation
    status: out_of_scope_local_only
    authority: docs/runbooks/image_publication.md
    reason: Published registry-image attestations are remote distribution proof, not local-only release evidence.
  - id: registry_push_signing_requirements
    status: out_of_scope_local_only
    authority: docs/runbooks/image_publication.md
    reason: Registry push, image signing, and signed image SBOM requirements are deferred unless remote distribution is approved.
  - id: automatic_key_rotation_external_secret_manager
    status: out_of_scope_local_only
    authority: docs/runbooks/access_control.md
    reason: Local static secret hygiene is sufficient unless a shared hosted environment is introduced.
  - id: full_user_auth_rbac_oidc_user_accounts
    status: out_of_scope_local_only
    authority: docs/runbooks/access_control.md
    reason: Full users, RBAC, OIDC/OAuth, user accounts, and hosted identity are not planned for local PC operation.
