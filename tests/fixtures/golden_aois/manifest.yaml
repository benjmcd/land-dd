# Golden AOI Fixture Manifest
#
# Nine representative rural-land AOI cases for the Private MVP Utility Proof.
# Geography: North Carolina — Buncombe, Chatham, Brunswick counties.
#
# connector_fixture_files: paths relative to tests/fixtures/connectors/
# geometry_file: path relative to tests/fixtures/golden_aois/
# expected_connector_workflow_domains: fixture connectors that will be invoked
# expected_not_evaluated_domains: domains with no connector; recorded as NOT_EVALUATED
# forbidden_claims: phrases that must NOT appear in any report dossier output

cases:

  - case_id: BUN-slope
    county: buncombe
    state: nc
    intent: rural_land_purchase
    description: Mountain/slope/elevation stress case — Black Mountain area
    geometry_file: bun_slope.geojson
    connector_fixture_files:
      flood: nc_buncombe_bun_slope_flood.json
      access: nc_buncombe_bun_slope_access.json
      buildability: nc_buncombe_bun_slope_buildability.json
      terrain: nc_buncombe_bun_slope_terrain.json
      parcels: nc_buncombe_bun_slope_parcels.json
    expected_connector_workflow_domains: [flood, access, buildability, terrain, parcels]
    expected_not_evaluated_domains: [assessor]
    expected_unknowns: [assessor_not_evaluated]
    expected_caveats:
      - Fixture-only flood screening for Buncombe County
      - does not confirm legal access
      - Assessor and tax data were not available
    forbidden_claims:
      - "You can build here"
      - "This parcel has legal access"
      - "This property has water rights"
      - "This is a good investment"
      - "This land is safe"
      - "This property is worth"
      - "legal boundary"

