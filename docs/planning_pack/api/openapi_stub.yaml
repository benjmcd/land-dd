components:
  schemas:
    AreaContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        area_type:
          $ref: '#/components/schemas/AreaType'
          default: drawn_polygon
        geom_confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        geom_geojson:
          additionalProperties: true
          title: Geom Geojson
          type: object
        geom_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Geom Source
        geom_srid:
          default: 4326
          title: Geom Srid
          type: integer
        geom_validated:
          default: false
          title: Geom Validated
          type: boolean
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
      title: AreaContract
      type: object
    AreaType:
      enum:
      - parcel_like
      - drawn_polygon
      - multi_polygon
      - locality
      - buffer
      - generated_candidate
      title: AreaType
      type: string
    AsyncReportRunResponse:
      properties:
        report_run_id:
          format: uuid
          title: Report Run Id
          type: string
        status:
          title: Status
          type: string
      required:
      - report_run_id
      - status
      title: AsyncReportRunResponse
      type: object
    AuthorityLevel:
      enum:
      - official_primary
      - official_secondary
      - commercial_normalized
      - open_community
      - derived_model
      - user_supplied
      - unknown
      title: AuthorityLevel
      type: string
    ClaimContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        assertion:
          title: Assertion
          type: string
        claim_code:
          title: Claim Code
          type: string
        claim_id:
          format: uuid
          title: Claim Id
          type: string
        confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        domain:
          default: unknown
          title: Domain
          type: string
        evidence_ids:
          items:
            format: uuid
            type: string
          title: Evidence Ids
          type: array
        rule_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Rule Code
        ruleset_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Ruleset Id
        ruleset_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Ruleset Version
        severity:
          $ref: '#/components/schemas/SeverityBand'
          default: unknown
        user_safe_language:
          default: ''
          title: User Safe Language
          type: string
        verification_required:
          default: true
          title: Verification Required
          type: boolean
        verification_task:
          anyOf:
          - type: string
          - type: 'null'
          title: Verification Task
      required:
      - area_id
      - claim_code
      - assertion
      - evidence_ids
      title: ClaimContract
      type: object
    ConfidenceBand:
      enum:
      - very_low
      - low
      - medium
      - high
      - very_high
      - unknown
      title: ConfidenceBand
      type: string
    ConnectorFixtureQualityIssueResponse:
      properties:
        blocking:
          title: Blocking
          type: boolean
        code:
          title: Code
          type: string
        message:
          title: Message
          type: string
      required:
      - code
      - message
      - blocking
      title: ConnectorFixtureQualityIssueResponse
      type: object
    ConnectorFixtureQualityResponse:
      properties:
        blocking_issue_count:
          title: Blocking Issue Count
          type: integer
        evidence_count:
          title: Evidence Count
          type: integer
        issues:
          items:
            $ref: '#/components/schemas/ConnectorFixtureQualityIssueResponse'
          title: Issues
          type: array
        passed:
          title: Passed
          type: boolean
        source_failure_count:
          title: Source Failure Count
          type: integer
      required:
      - passed
      - evidence_count
      - source_failure_count
      - blocking_issue_count
      - issues
      title: ConnectorFixtureQualityResponse
      type: object
    ConnectorReviewQueueItemResponse:
      properties:
        attempts:
          title: Attempts
          type: integer
        created_at:
          format: date-time
          title: Created At
          type: string
        finished_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Finished At
        idempotency_key:
          title: Idempotency Key
          type: string
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        job_id:
          format: uuid
          title: Job Id
          type: string
        job_type:
          title: Job Type
          type: string
        last_error:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Error
        locked_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Locked At
        locked_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Locked By
        max_attempts:
          title: Max Attempts
          type: integer
        payload:
          additionalProperties: true
          title: Payload
          type: object
        priority:
          title: Priority
          type: integer
        started_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Started At
        status:
          title: Status
          type: string
      required:
      - job_id
      - ingest_run_id
      - job_type
      - status
      - priority
      - idempotency_key
      - payload
      - created_at
      - attempts
      - max_attempts
      - locked_by
      - locked_at
      - started_at
      - finished_at
      - last_error
      title: ConnectorReviewQueueItemResponse
      type: object
    ConnectorRunReviewStatusResponse:
      properties:
        connector_name:
          title: Connector Name
          type: string
        dataset_version_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Dataset Version Id
        disposition:
          title: Disposition
          type: string
        evidence_created_count:
          title: Evidence Created Count
          type: integer
        evidence_skipped_count:
          title: Evidence Skipped Count
          type: integer
        ingest_run_id:
          format: uuid
          title: Ingest Run Id
          type: string
        priority:
          title: Priority
          type: string
        quality:
          $ref: '#/components/schemas/ConnectorFixtureQualityResponse'
        queue_name:
          title: Queue Name
          type: string
        retrieval_status:
          title: Retrieval Status
          type: string
        review_required:
          title: Review Required
          type: boolean
        signal_codes:
          items:
            type: string
          title: Signal Codes
          type: array
        source_failure_created_count:
          title: Source Failure Created Count
          type: integer
        source_failure_skipped_count:
          title: Source Failure Skipped Count
          type: integer
        summary:
          title: Summary
          type: string
        tasks:
          items:
            type: string
          title: Tasks
          type: array
        title:
          title: Title
          type: string
      required:
      - queue_name
      - disposition
      - priority
      - title
      - summary
      - connector_name
      - ingest_run_id
      - dataset_version_id
      - retrieval_status
      - review_required
      - evidence_created_count
      - evidence_skipped_count
      - source_failure_created_count
      - source_failure_skipped_count
      - signal_codes
      - tasks
      - quality
      title: ConnectorRunReviewStatusResponse
      type: object
    EvidenceContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        caveat:
          anyOf:
          - type: string
          - type: 'null'
          title: Caveat
        confidence:
          $ref: '#/components/schemas/ConfidenceBand'
          default: unknown
        dataset_version_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Dataset Version Id
        domain:
          title: Domain
          type: string
        evidence_code:
          title: Evidence Code
          type: string
        evidence_id:
          format: uuid
          title: Evidence Id
          type: string
        evidence_type:
          $ref: '#/components/schemas/EvidenceType'
          default: source_observation
        geometry_geojson:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Geometry Geojson
        geometry_srid:
          default: 4326
          title: Geometry Srid
          type: integer
        is_negative_evidence:
          default: false
          title: Is Negative Evidence
          type: boolean
        is_source_failure:
          default: false
          title: Is Source Failure
          type: boolean
        method_code:
          title: Method Code
          type: string
        method_version:
          default: 0.1.0
          title: Method Version
          type: string
        observation:
          title: Observation
          type: string
        observed_at:
          format: date-time
          title: Observed At
          type: string
        observed_value:
          additionalProperties: true
          title: Observed Value
          type: object
        source_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Date
        source_id:
          format: uuid
          title: Source Id
          type: string
        spatial_precision_meters:
          anyOf:
          - minimum: 0.0
            type: number
          - type: 'null'
          title: Spatial Precision Meters
        superseded_by:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Superseded By
      required:
      - area_id
      - evidence_code
      - domain
      - observation
      - source_id
      - method_code
      title: EvidenceContract
      type: object
    EvidenceType:
      enum:
      - source_observation
      - spatial_intersection
      - derived_metric
      - document_extract
      - source_failure
      - human_verification
      - manual_note
      title: EvidenceType
      type: string
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    IntakeRequest:
      properties:
        area_geojson:
          additionalProperties: true
          title: Area Geojson
          type: object
        intent_code:
          $ref: '#/components/schemas/IntentCode'
      required:
      - area_geojson
      - intent_code
      title: IntakeRequest
      type: object
    IntakeResponse:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        report_run_id:
          format: uuid
          title: Report Run Id
          type: string
        status:
          default: queued
          title: Status
          type: string
      required:
      - report_run_id
      - area_id
      title: IntakeResponse
      type: object
    IntentCode:
      description: 'Intent codes that drive report evaluation.


        Values must exactly match the core.intent_code SQL enum defined in

        db/migrations/0001_initial_spine.sql. Two intents are seeded in

        db/seeds/001_seed_intents.sql; others are defined for future use.


        Do not add or rename values here without a coordinated schema migration.'
      enum:
      - rural_land_purchase
      - homestead_feasibility
      - farmland
      - development
      - solar
      - data_center
      - conservation
      - mineral_resource_screen
      - speculative_hold
      title: IntentCode
      type: string
    JobStatus:
      enum:
      - queued
      - running
      - succeeded
      - failed
      - cancelled
      - needs_review
      title: JobStatus
      type: string
    ReportRunContract:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        artifact_metadata:
          additionalProperties: true
          title: Artifact Metadata
          type: object
        assumptions:
          items:
            type: string
          title: Assumptions
          type: array
        caveats:
          items:
            type: string
          title: Caveats
          type: array
        claims:
          items:
            $ref: '#/components/schemas/ClaimContract'
          title: Claims
          type: array
        evidence:
          items:
            $ref: '#/components/schemas/EvidenceContract'
          title: Evidence
          type: array
        finished_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Finished At
        intent_code:
          $ref: '#/components/schemas/IntentCode'
        output_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Uri
        red_flags:
          items:
            $ref: '#/components/schemas/ClaimContract'
          title: Red Flags
          type: array
        report_run_id:
          format: uuid
          title: Report Run Id
          type: string
        source_manifest:
          additionalProperties: true
          title: Source Manifest
          type: object
        started_at:
          format: date-time
          title: Started At
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
          default: queued
        unknowns:
          items:
            $ref: '#/components/schemas/ClaimContract'
          title: Unknowns
          type: array
        verification_tasks:
          items:
            type: string
          title: Verification Tasks
          type: array
      required:
      - area_id
      - intent_code
      title: ReportRunContract
      type: object
    ReportRunCreateRequest:
      properties:
        area_id:
          format: uuid
          title: Area Id
          type: string
        intent_code:
          $ref: '#/components/schemas/IntentCode'
      required:
      - area_id
      - intent_code
      title: ReportRunCreateRequest
      type: object
    SeverityBand:
      enum:
      - critical
      - high
      - medium
      - low
      - informational
      - unknown
      title: SeverityBand
      type: string
    SourceContract:
      properties:
        ai_use_allowed:
          default: unknown
          title: Ai Use Allowed
          type: string
        attribution_required:
          default: false
          title: Attribution Required
          type: boolean
        authority_level:
          $ref: '#/components/schemas/AuthorityLevel'
          default: unknown
        cache_allowed:
          default: unknown
          title: Cache Allowed
          type: string
        commercial_use_status:
          default: unknown
          title: Commercial Use Status
          type: string
        domain:
          title: Domain
          type: string
        export_allowed:
          default: unknown
          title: Export Allowed
          type: string
        freshness_class:
          default: unknown
          title: Freshness Class
          type: string
        geographic_scope:
          anyOf:
          - type: string
          - type: 'null'
          title: Geographic Scope
        homepage_url:
          anyOf:
          - format: uri
            maxLength: 2083
            minLength: 1
            type: string
          - type: 'null'
          title: Homepage Url
        last_checked_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Checked At
        license_status:
          default: unknown
          title: License Status
          type: string
        license_summary:
          anyOf:
          - type: string
          - type: 'null'
          title: License Summary
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        name:
          title: Name
          type: string
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
        organization:
          anyOf:
          - type: string
          - type: 'null'
          title: Organization
        raw_data_allowed:
          default: unknown
          title: Raw Data Allowed
          type: string
        redistribution_status:
          default: unknown
          title: Redistribution Status
          type: string
        review_owner:
          anyOf:
          - type: string
          - type: 'null'
          title: Review Owner
        review_status:
          default: pending
          title: Review Status
          type: string
        source_id:
          format: uuid
          title: Source Id
          type: string
        source_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Type
        update_cadence:
          anyOf:
          - type: string
          - type: 'null'
          title: Update Cadence
      required:
      - name
      - domain
      title: SourceContract
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Intent-aware land/locality due-diligence backend scaffold.
  title: land-diligence
  version: 0.1.0
openapi: 3.1.0
paths:
  /areas:
    get:
      operationId: list_areas_areas_get
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AreaContract'
                title: Response List Areas Areas Get
                type: array
          description: Successful Response
      summary: List Areas
      tags:
      - areas
    post:
      operationId: create_area_areas_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaContract'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaContract'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Area
      tags:
      - areas
  /connector-runs/{ingest_run_id}/review-actions/cancel_review:
    post:
      operationId: cancel_review_connector_runs__ingest_run_id__review_actions_cancel_review_post
      parameters:
      - in: path
        name: ingest_run_id
        required: true
        schema:
          format: uuid
          title: Ingest Run Id
          type: string
      - in: header
        name: X-Reviewer-Id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Id
      - in: header
        name: X-Reviewer-Token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Token
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Cancel Review Connector Runs  Ingest Run Id  Review
                  Actions Cancel Review Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Cancel Review
      tags:
      - connector-runs
  /connector-runs/{ingest_run_id}/review-actions/request_fixture_fix:
    post:
      operationId: request_fixture_fix_connector_runs__ingest_run_id__review_actions_request_fixture_fix_post
      parameters:
      - in: path
        name: ingest_run_id
        required: true
        schema:
          format: uuid
          title: Ingest Run Id
          type: string
      - in: header
        name: X-Reviewer-Id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Id
      - in: header
        name: X-Reviewer-Token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Token
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Request Fixture Fix Connector Runs  Ingest Run Id  Review
                  Actions Request Fixture Fix Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Request Fixture Fix
      tags:
      - connector-runs
  /connector-runs/{ingest_run_id}/review-actions/requeue_after_fix:
    post:
      operationId: requeue_after_fix_connector_runs__ingest_run_id__review_actions_requeue_after_fix_post
      parameters:
      - in: path
        name: ingest_run_id
        required: true
        schema:
          format: uuid
          title: Ingest Run Id
          type: string
      - in: header
        name: X-Reviewer-Id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Id
      - in: header
        name: X-Reviewer-Token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Reviewer-Token
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Requeue After Fix Connector Runs  Ingest Run Id  Review
                  Actions Requeue After Fix Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Requeue After Fix
      tags:
      - connector-runs
  /connector-runs/{ingest_run_id}/review-queue:
    get:
      operationId: get_connector_review_queue_item_connector_runs__ingest_run_id__review_queue_get
      parameters:
      - in: path
        name: ingest_run_id
        required: true
        schema:
          format: uuid
          title: Ingest Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorReviewQueueItemResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Connector Review Queue Item
      tags:
      - connector-runs
  /connector-runs/{ingest_run_id}/review-status:
    get:
      operationId: get_connector_run_review_status_connector_runs__ingest_run_id__review_status_get
      parameters:
      - in: path
        name: ingest_run_id
        required: true
        schema:
          format: uuid
          title: Ingest Run Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorRunReviewStatusResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Connector Run Review Status
      tags:
      - connector-runs
  /evidence:
    get:
      operationId: list_evidence_evidence_get
      parameters:
      - in: query
        name: area_id
        required: true
        schema:
          format: uuid
          title: Area Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/EvidenceContract'
                title: Response List Evidence Evidence Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Evidence
      tags:
      - evidence
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Health Get
                type: object
          description: Successful Response
      summary: Health
      tags:
      - health
  /intake:
    post:
      operationId: intake_report_intake_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntakeRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Intake Report
      tags:
      - intake
  /report-runs:
    post:
      operationId: create_report_run_report_runs_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRunCreateRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncReportRunResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Report Run
      tags:
